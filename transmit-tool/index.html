<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Universal QR Transmitter</title>
<script>
  if (localStorage.getItem('safekeepTheme') === 'light') {
    document.documentElement.setAttribute('data-theme', 'light');
  }
</script>
<style>
  :root { --bg: #0f0f0f; --card: #161616; --card2: #1c1c1c; --border: #2a2a2a; --orange: #f7931a; --teal: #03dac6; --red: #cf6679; --muted: #888; --text: #e0e0e0; --mono: 'Courier New', Courier, monospace; --input-bg: #2c2c2c; }
  [data-theme="light"] { --bg: #f5f5f7; --card: #ffffff; --card2: #f0f0f0; --border: #cccccc; --text: #121212; --muted: #555555; --teal: #018786; --red: #b00020; --input-bg: #e0e0e0; --orange: #d87c14; }

  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { background: var(--bg); color: var(--text); font-family: -apple-system, BlinkMacSystemFont, sans-serif; line-height: 1.6; transition: all 0.3s ease; }
  nav { background: var(--card); border-bottom: 1px solid var(--border); padding: 1rem 1.5rem; display: flex; justify-content: space-between; align-items: center; margin-bottom: 2rem; }
  .nav-brand { font-weight: 800; font-size: 1.15rem; color: var(--text); text-decoration: none; }
  .nav-brand span { color: var(--orange); }

  .container { max-width: 850px; margin: 0 auto; padding: 0 1rem 3rem; }
  .card { background: var(--card); border: 1px solid var(--border); border-radius: 12px; padding: 2rem; box-shadow: 0 10px 30px rgba(0,0,0,0.5); margin-bottom: 25px; }
  
  h1 { text-align: center; color: var(--text); text-transform: uppercase; letter-spacing: 2px; font-size: 1.5rem; margin-bottom: 5px;}
  .subtitle { text-align: center; color: var(--muted); font-size: 0.9rem; margin-bottom: 1.5rem; }

  label { font-size: 0.85rem; font-weight: bold; color: var(--muted); text-transform: uppercase; letter-spacing: 1px; display: block; margin-bottom: 8px; }
  input[type="file"] { padding: 15px; background: var(--card2); border: 1px dashed var(--orange); cursor: pointer; width: 100%; margin-bottom: 15px; border-radius: 8px; color: var(--text);}
  input[type="number"] { background: var(--bg); color: var(--text); border: 1px solid var(--border); padding: 10px; border-radius: 6px; font-size: 1rem; width: 100px; margin-left: 10px;}
  
  .settings-row { display: flex; gap: 20px; flex-wrap: wrap; margin-bottom: 20px; background: var(--card2); padding: 15px; border-radius: 8px; border: 1px solid var(--border); }
  .setting-item { display: flex; align-items: center; justify-content: space-between; flex: 1; min-width: 200px; }

  .btn { display: inline-block; width: 100%; padding: 15px; font-size: 1.1rem; background: var(--teal); color: #111; border: none; border-radius: 8px; cursor: pointer; font-weight: 800; text-transform: uppercase; letter-spacing: 1px; transition: all 0.3s; margin-bottom: 10px; }
  .btn:hover { opacity: 0.8; transform: translateY(-2px); }
  .btn:disabled { background: var(--border); color: var(--muted); cursor: not-allowed; transform: none; }
  .btn-danger { background: var(--red); color: white; }

  .status-box { background: rgba(3,218,198,0.1); border: 1px solid var(--teal); color: var(--teal); padding: 15px; border-radius: 8px; text-align: center; font-weight: bold; margin-bottom: 20px; display: none; }
  .progress-bar-container { width: 100%; background: var(--input-bg); border-radius: 8px; overflow: hidden; height: 10px; margin-bottom: 20px; }
  .progress-bar { height: 100%; background: var(--orange); width: 0%; transition: width 0.1s linear; }

  .qr-display { text-align: center; margin-top: 20px; display: none; }
  .qr-display canvas { border: 10px solid white; border-radius: 8px; max-width: 100%; height: auto; }
  .qr-info { font-family: var(--mono); color: var(--muted); font-size: 0.85rem; margin-top: 15px; }
</style>
</head>
<body>

<nav>
  <a href="../index.html" class="nav-brand">SafeKeep<span>Bitcoin</span></a>
  <button type="button" id="theme-btn" style="background:transparent; border:none; color:var(--text); font-size:1.2rem; cursor:pointer;">☀️</button>
</nav>

<div class="container">
    <h1>Universal QR Transmitter</h1>
    <div class="subtitle">Air-gap export any file via animated QR codes</div>

    <div class="card">
        <label>1. Select File to Transmit</label>
        <input type="file" id="fileInput" accept="*/*">
        <div id="fileInfo" class="status-box"></div>

        <label>2. Transmission Settings</label>
        <div class="settings-row">
            <div class="setting-item">
                <span style="font-size: 0.85rem; font-weight: bold; color: var(--muted); text-transform: uppercase;">Density (Bytes)</span>
                <input type="number" id="chunkSize" value="250" min="50" max="800">
            </div>
            <div class="setting-item">
                <span style="font-size: 0.85rem; font-weight: bold; color: var(--muted); text-transform: uppercase;">Speed (FPS)</span>
                <input type="number" id="fps" value="4" min="1" max="10">
            </div>
        </div>

        <button type="button" class="btn" id="startBtn" disabled>▶️ Start Transmission Loop</button>
        <button type="button" class="btn btn-danger" id="stopBtn" style="display: none;">⏹️ Stop Transmission</button>
        
        <div class="progress-bar-container">
            <div class="progress-bar" id="progressBar"></div>
        </div>

        <div class="qr-display" id="qrDisplayContainer">
            <canvas id="qrCanvas"></canvas>
            <div class="qr-info" id="qrInfo"></div>
        </div>
    </div>
</div>

<script type="module" src="./transmit.js"></script>
</body>
</html>
