<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Universal QR Receiver</title>
<script>
  if (localStorage.getItem('safekeepTheme') === 'light') {
    document.documentElement.setAttribute('data-theme', 'light');
  }
</script>
<style>
  :root { --bg: #0f0f0f; --card: #161616; --card2: #1c1c1c; --border: #2a2a2a; --orange: #f7931a; --teal: #03dac6; --red: #cf6679; --muted: #888; --text: #e0e0e0; --mono: 'Courier New', Courier, monospace; --input-bg: #2c2c2c; }
  [data-theme="light"] { --bg: #f5f5f7; --card: #ffffff; --card2: #f0f0f0; --border: #cccccc; --text: #121212; --muted: #555555; --teal: #018786; --red: #b00020; --input-bg: #e0e0e0; --orange: #d87c14; }

  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { background: var(--bg); color: var(--text); font-family: -apple-system, BlinkMacSystemFont, sans-serif; line-height: 1.6; transition: all 0.3s ease; }
  nav { background: var(--card); border-bottom: 1px solid var(--border); padding: 1rem 1.5rem; display: flex; justify-content: space-between; align-items: center; margin-bottom: 2rem; }
  .nav-brand { font-weight: 800; font-size: 1.15rem; color: var(--text); text-decoration: none; }
  .nav-brand span { color: var(--orange); }

  .container { max-width: 850px; margin: 0 auto; padding: 0 1rem 3rem; }
  .card { background: var(--card); border: 1px solid var(--border); border-radius: 12px; padding: 2rem; box-shadow: 0 10px 30px rgba(0,0,0,0.5); margin-bottom: 25px; }
  
  h1 { text-align: center; color: var(--text); text-transform: uppercase; letter-spacing: 2px; font-size: 1.5rem; margin-bottom: 5px;}
  .subtitle { text-align: center; color: var(--muted); font-size: 0.9rem; margin-bottom: 1.5rem; }

  .btn { display: block; width: 100%; padding: 15px; font-size: 1.1rem; background: var(--teal); color: #111; border: none; border-radius: 8px; cursor: pointer; font-weight: 800; text-transform: uppercase; letter-spacing: 1px; transition: all 0.3s; margin-bottom: 10px; }
  .btn:hover { opacity: 0.8; transform: translateY(-2px); }
  .btn-danger { background: var(--red); color: white; }

  .camera-box { border: 2px solid var(--border); border-radius: 8px; padding: 10px; margin-bottom: 20px; display: none; background: #000; text-align: center; }
  #reader { width: 100%; max-width: 450px; margin: 0 auto; border-radius: 4px; overflow: hidden; }

  .status-metrics { display: flex; justify-content: space-between; background: var(--card2); padding: 15px; border-radius: 8px; border: 1px solid var(--border); margin-bottom: 20px; font-family: var(--mono); font-size: 0.9rem; }
  .progress-bar-container { width: 100%; background: var(--input-bg); border-radius: 8px; overflow: hidden; height: 15px; margin-bottom: 20px; border: 1px solid var(--border); }
  .progress-bar { height: 100%; background: var(--teal); width: 0%; transition: width 0.2s ease; }

  /* Modal */
  .modal-overlay { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.8); z-index: 1000; align-items: center; justify-content: center; }
  .modal-content { background: var(--card); padding: 30px; border-radius: 8px; border: 1px solid var(--border); max-width: 450px; width: 90%; color: var(--text); line-height: 1.6; text-align: center; }
  input[type="text"] { background: var(--bg); color: var(--text); border: 1px solid var(--border); padding: 10px; border-radius: 6px; font-size: 1rem; width: 100%; transition: border-color 0.3s ease; margin: 15px 0; font-family: var(--mono); }
</style>
</head>
<body>

<nav>
  <a href="../index.html" class="nav-brand">SafeKeep<span>Bitcoin</span></a>
  <button type="button" id="theme-btn" style="background:transparent; border:none; color:var(--text); font-size:1.2rem; cursor:pointer;">☀️</button>
</nav>

<div class="container">
    <h1>Universal QR Receiver</h1>
    <div class="subtitle">Optically import files from an air-gapped transmitter</div>

    <div class="card">
        <button type="button" class="btn" id="startBtn">📸 Open Camera & Scan</button>
        
        <div id="cameraBox" class="camera-box">
            <div id="reader"></div>
            <button type="button" class="btn btn-danger" id="stopBtn" style="margin-top:15px;">Cancel Scan</button>
        </div>

        <div class="status-metrics">
            <div><strong>Chunks:</strong> <span id="chunkCount">0 / 0</span></div>
            <div><strong>File:</strong> <span id="incomingFileName">Awaiting data...</span></div>
        </div>

        <div class="progress-bar-container">
            <div class="progress-bar" id="progressBar"></div>
        </div>
    </div>
</div>

<div id="downloadModal" class="modal-overlay">
    <div class="modal-content">
        <h2 style="color: var(--teal); margin-top: 0;">🎉 Transfer Complete!</h2>
        <p style="font-size: 0.9em; color: var(--muted); margin-bottom: 15px;">Your file has been fully reassembled. Review the name and save it locally.</p>
        
        <div style="background: var(--card2); border: 1px solid var(--border); padding: 15px; border-radius: 6px; text-align: left; font-size: 0.9em;">
            <strong>Original File:</strong> <span id="modalFileDetails" style="color: var(--orange);"></span>
        </div>

        <input type="text" id="filenameInput" placeholder="Save as...">
        
        <button type="button" class="btn" id="btn-download">💾 Save File</button>
        <button type="button" class="btn" style="background: transparent; border: 1px solid var(--border); color: var(--text);" id="btn-close-modal">Cancel</button>
    </div>
</div>

<script type="module" src="./receive.js"></script>
</body>
</html>
