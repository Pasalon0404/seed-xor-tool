<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Visual Architecture Builder | SafeKeepBitcoin</title>
    
    <script src="qrcode.min.js"></script>

    <style>
        :root {
            --bg-color: #121212;
            --card-bg: #1e1e1e;
            --text-color: #e0e0e0;
            --primary: #f7931a;
            --border-color: #333333;
            --box-bg: #2c2c2c;
            --text-muted: #888888;
            --danger: #cf6679;
        }
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-color);
            margin: 0; padding: 20px;
        }
        .container { max-width: 800px; margin: 0 auto; }
        .controls {
            background: var(--card-bg); padding: 20px;
            border-radius: 8px; border: 1px solid var(--border-color);
            margin-bottom: 20px; display: flex; gap: 20px; align-items: center;
        }
        select, button, input {
            padding: 10px; background: var(--box-bg); color: white;
            border: 1px solid var(--border-color); border-radius: 4px;
            font-size: 1rem; box-sizing: border-box;
        }
        button { background: var(--primary); color: #121212; font-weight: bold; cursor: pointer; }
        button:hover { opacity: 0.9; }
        
        /* The Canvas */
        .canvas {
            background: var(--card-bg); padding: 40px; border-radius: 8px;
            border: 2px dashed var(--border-color); min-height: 400px;
            display: flex; flex-direction: column; align-items: center; gap: 30px;
        }
        .coordinator {
            background: rgba(247, 147, 26, 0.05); border: 2px solid var(--primary);
            padding: 20px; border-radius: 8px; text-align: center; 
            width: 100%; max-width: 450px; box-sizing: border-box;
        }
        .keys-container {
            display: flex; flex-direction: column; gap: 20px; align-items: center; width: 100%;
        }
        .key-box {
            background: var(--box-bg); border: 1px solid #555;
            padding: 20px 25px; border-radius: 6px; text-align: center; 
            width: 100%; max-width: 450px; box-sizing: border-box;
            display: flex; flex-direction: column; gap: 15px;
        }
        
        /* Input Group Styles */
        .input-group {
            display: flex; flex-direction: column; text-align: left; gap: 5px;
        }
        .input-group label {
            font-size: 0.75rem; color: var(--primary); 
            text-transform: uppercase; letter-spacing: 0.5px; font-weight: bold;
        }
        .input-group input, .input-group textarea { 
            width: 100%; font-size: 0.9rem; padding: 10px; background: var(--box-bg);
            color: white; border: 1px solid var(--border-color); border-radius: 4px; box-sizing: border-box;
        }
        .input-group textarea { font-family: monospace; resize: vertical; }

        /* Recovery Section Styles */
        .recovery-section {
            width: 100%; max-width: 600px; margin-top: 20px; 
            border-top: 2px solid var(--border-color); padding-top: 30px;
            display: flex; flex-direction: column; gap: 20px;
        }
        
        /* OpSec Warning Banner */
        .opsec-warning {
            background: rgba(207, 102, 121, 0.05);
            border-left: 4px solid var(--danger);
            padding: 12px 15px;
            font-size: 0.85rem;
            color: var(--text-muted);
            line-height: 1.5;
        }
        .opsec-warning strong {
            color: var(--danger);
        }

        .qr-btn { background: var(--box-bg); border: 1px solid var(--primary); color: var(--primary); }
        .qr-btn:hover { background: rgba(247, 147, 26, 0.1); }
        
        .qr-placeholder {
            width: 220px; height: 220px; margin: 15px auto 0; /* Added margin-top to separate from button */
            border: 2px dashed #555; display: flex; align-items: center; justify-content: center;
            background: white; color: black; font-weight: bold; font-size: 0.8rem; text-align: center;
            padding: 10px; box-sizing: border-box;
        }
        .qr-placeholder img, .qr-placeholder canvas { max-width: 100%; height: auto; }

        /* Print Styles */
        @media print {
            .controls, .qr-btn, .opsec-warning { display: none; }
            .canvas { border: none; padding: 0; background: white; color: black; gap: 20px; }
            .key-box, .coordinator { border: 2px solid black; background: white; color: black; }
            input, textarea { border: 1px dashed #ccc; background: transparent; color: black; }
            input::placeholder, textarea::placeholder { color: #aaa; }
            .input-group label { color: #555; }
            .recovery-section { border-top: 2px solid black; page-break-inside: avoid; }
        }
    </style>
</head>
<body>

<div class="container">
    <h2>Visual Architecture Builder</h2>
    
    <div class="controls">
        <label>Architecture:</label>
        <select id="archType">
            <option value="single">Single-Sig (1-of-1)</option>
            <option value="multi-23" selected>Multisig (2-of-3)</option>
            <option value="multi-35">Multisig (3-of-5)</option>
            <option value="xor-2">Seed XOR (2 Parts)</option>
            <option value="xor-3">Seed XOR (3 Parts)</option>
            <option value="xor-4">Seed XOR (4 Parts)</option>
        </select>
        <button onclick="window.print()">Print / Save PDF</button>
    </div>

    <div class="canvas" id="canvas">
        </div>
</div>

<script>
    const canvas = document.getElementById('canvas');
    const archType = document.getElementById('archType');

    const devices = ['Coldcard Q', 'Coldcard Mk4', 'Trezor Safe 3', 'Trezor Model T', 'BitBox02', 'SeedSigner', 'Paper Backup', 'Steel Plate'];
    const coordinators = ['Sparrow Wallet', 'Specter Desktop', 'Electrum', 'Blue Wallet'];

    function generateSelectHTML(optionsArray, labelText, placeholder) {
        const listId = 'list-' + Math.random().toString(36).substring(2, 9);
        const optionsList = optionsArray.map(opt => `<option value="${opt}">`).join('');
        return `
            <div class="input-group">
                <label>${labelText}</label>
                <input list="${listId}" placeholder="${placeholder}" autocomplete="off">
                <datalist id="${listId}">${optionsList}</datalist>
            </div>
        `;
    }

    function generateInputHTML(labelText, placeholder) {
        return `
            <div class="input-group">
                <label>${labelText}</label>
                <input type="text" placeholder="${placeholder}">
            </div>
        `;
    }

    function generateRecoveryBlock() {
        return `
            <div class="recovery-section">
                <div class="recovery-data" id="recoveryData">
                    <div class="opsec-warning">
                        <strong>⚠️ Privacy Warning:</strong> Output descriptors contain extended public keys (xpubs) that reveal your entire wallet balance and transaction history. Ensure this machine is secure and completely offline before pasting your data.
                    </div>
                    <div class="input-group">
                        <label>Output Descriptor</label>
                        <textarea id="descriptorInput" placeholder="wsh(sortedmulti(2,[fingerprint/derivation]xpub...))" rows="5"></textarea>
                    </div>
                    <button class="qr-btn" onclick="generateQR()">Generate Offline QR Code</button>
                    <div class="qr-placeholder" id="qrCanvas">
                        <span id="qrText">QR Code<br>Appears Here</span>
                    </div>
                </div>
            </div>
        `;
    }

    // Function to generate the actual QR code
    window.generateQR = function() {
        const input = document.getElementById('descriptorInput').value.trim();
        const qrCanvas = document.getElementById('qrCanvas');

        if (!input) {
            alert("Please paste your output descriptor first.");
            return;
        }

        // Clear the placeholder text or previous QR code
        qrCanvas.innerHTML = '';

        try {
            new QRCode(qrCanvas, {
                text: input,
                width: 200,
                height: 200,
                colorDark : "#000000",
                colorLight : "#ffffff",
                correctLevel : QRCode.CorrectLevel.L
            });
            // Remove the dashed border to make it look cleaner once generated
            qrCanvas.style.border = "none"; 
            qrCanvas.style.padding = "0"; 
        } catch (e) {
            console.error("QR Library error:", e);
            alert("Could not generate QR code. Ensure 'qrcode.min.js' is downloaded and in the same folder as this file.");
            qrCanvas.innerHTML = '<span id="qrText" style="color: red;">Library<br>Missing</span>';
            qrCanvas.style.border = "2px dashed red";
        }
    };

    function renderArchitecture() {
        const type = archType.value;
        let html = '';

        // MULTISIG LOGIC
        if (type.startsWith('multi')) {
            const parts = type.split('-');
            const totalKeys = parseInt(parts[1][1]);
            const requiredKeys = parseInt(parts[1][0]);

            html += `
                <div class="coordinator">
                    <h3 style="margin-top:0;">Multisig Quorum (${requiredKeys}-of-${totalKeys})</h3>
                    ${generateSelectHTML(coordinators, 'Coordinator Software', 'Select or type software...')}
                </div>
                <div class="keys-container">
            `;
            for(let i=1; i<=totalKeys; i++) {
                html += `
                    <div class="key-box">
                        <strong style="font-size: 1.1rem; margin-bottom: 5px;">Signer ${i}</strong>
                        ${generateSelectHTML(devices, 'Hardware Device', 'Select or type device...')}
                        ${generateInputHTML('Physical Location', 'e.g. Home Safe')}
                        ${generateInputHTML('Last Seed Word', "e.g. 'abandon'")}
                        ${generateInputHTML('Notes', 'e.g. Passphrase used')}
                    </div>
                `;
            }
            html += `</div>`;
        } 
        // SINGLE-SIG LOGIC
        else if (type === 'single') {
            html += `
                <div class="coordinator">
                    <h3 style="margin-top:0;">Single-Sig (1-of-1)</h3>
                    ${generateSelectHTML(devices, 'Primary Device', 'Select or type device...')}
                </div>
                <div class="keys-container">
                    <div class="key-box">
                        <strong style="font-size: 1.1rem; margin-bottom: 5px;">BIP39 Backup</strong>
                        ${generateSelectHTML(['Steel Plate', 'Paper Backup'], 'Backup Format', 'Select or type format...')}
                        ${generateInputHTML('Physical Location', 'Location...')}
                        ${generateInputHTML('Last Seed Word', "e.g. 'abandon'")}
                        ${generateInputHTML('Notes', 'Notes...')}
                    </div>
                     <div class="key-box">
                        <strong style="font-size: 1.1rem; margin-bottom: 5px;">Passphrase (Optional)</strong>
                        ${generateSelectHTML(['Memory', 'Paper Backup', 'Steel Plate', 'Password Manager'], 'Storage Method', 'Select or type storage...')}
                        ${generateInputHTML('Physical Location', 'Location...')}
                        ${generateInputHTML('Notes', 'Hint or actual string')}
                    </div>
                </div>
            `;
        }
        // SEED XOR LOGIC
        else if (type.startsWith('xor')) {
            const parts = type.split('-');
            const totalShares = parseInt(parts[1]);

            html += `
                <div class="coordinator">
                    <h3 style="margin-top:0;">Seed XOR (${totalShares} Parts)</h3>
                    ${generateSelectHTML(devices, 'Target Hardware Wallet', 'Select or type target device...')}
                    <p style="font-size: 0.8rem; color: var(--text-muted); margin-top: 15px; margin-bottom: 0;">All shares are required to reconstruct the master seed.</p>
                </div>
                <div class="keys-container">
            `;
            const alphabet = "ABCDEFGHIJKLMNOPQRSTUVWXYZ";
            for(let i=0; i<totalShares; i++) {
                html += `
                    <div class="key-box">
                        <strong style="font-size: 1.1rem; margin-bottom: 5px;">XOR Share ${alphabet[i]}</strong>
                        ${generateSelectHTML(['Paper Backup', 'Steel Plate', 'MicroSD'], 'Storage Media', 'Select or type storage...')}
                        ${generateInputHTML('Physical Location', 'Location...')}
                        ${generateInputHTML('Last Seed Word', "e.g. 'abandon'")}
                        ${generateInputHTML('Notes', 'e.g. Hex vs Words')}
                    </div>
                `;
            }
            html += `</div>`;
        }

        // Append the universal recovery block
        html += generateRecoveryBlock();
        canvas.innerHTML = html;
    }

    archType.addEventListener('change', renderArchitecture);
    
    // Initial render on load
    renderArchitecture();
</script>

</body>
</html>
