<style>
  /* Tool-specific overrides only — everything else comes from design-system.css */

  /* Autocomplete dropdown for seed input */
  .skb-autocomplete-list {
    position: absolute;
    top: 100%; left: 0; right: 0;
    background: var(--skb-bg-secondary);
    border: 1px solid var(--skb-border);
    border-radius: var(--skb-radius-sm);
    max-height: 150px;
    overflow-y: auto;
    z-index: 1000;
    display: none;
    box-shadow: var(--skb-shadow);
  }
  .skb-autocomplete-item {
    padding: 6px 10px;
    cursor: pointer;
    font-family: var(--skb-mono);
    font-size: 0.82rem;
    color: var(--skb-text);
    border-bottom: 1px solid var(--skb-border);
    transition: background var(--skb-transition);
  }
  .skb-autocomplete-item:last-child { border-bottom: none; }
  .skb-autocomplete-item:hover,
  .skb-autocomplete-item.active-suggestion {
    background: var(--skb-secondary);
    color: #000;
    font-weight: bold;
  }

  /* Scanner container */
  .skb-scanner-box {
    display: none;
    margin-top: 12px;
    padding: 12px;
    background: #000;
    border: 1px solid var(--skb-border);
    border-radius: var(--skb-radius-md);
    text-align: center;
  }
  .skb-scanner-box.visible { display: block; }
  .skb-scanner-box > div {
    width: 100%;
    max-width: 400px;
    margin: 0 auto;
    border-radius: var(--skb-radius-md);
    overflow: hidden;
  }

  /* Cosigner block styling */
  .cosigner-block {
    border: 1px solid var(--skb-border);
    border-radius: var(--skb-radius-md);
    padding: 1.25rem;
    margin-bottom: 1rem;
    background: var(--skb-bg-tertiary);
    transition: background var(--skb-transition), border var(--skb-transition);
  }
  .cosigner-block:last-child { margin-bottom: 0; }

  .cosigner-header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-bottom: 1rem;
  }
  .cosigner-label {
    font-size: 0.82rem;
    font-weight: 700;
    text-transform: uppercase;
    letter-spacing: 0.06em;
    color: var(--skb-text-muted);
  }
  .cosigner-fingerprint {
    font-family: var(--skb-mono);
    font-size: 0.78rem;
    color: var(--skb-secondary);
    font-weight: 600;
  }

  /* Input mode tabs within cosigner */
  .input-mode-tabs {
    display: flex;
    gap: 0;
    border: 1px solid var(--skb-border);
    border-radius: var(--skb-radius-sm);
    overflow: hidden;
    margin-bottom: 12px;
  }
  .input-mode-tab {
    flex: 1;
    padding: 8px 12px;
    background: var(--skb-bg-input);
    border: none;
    color: var(--skb-text-muted);
    font-size: 0.78rem;
    font-weight: 600;
    text-transform: uppercase;
    letter-spacing: 0.04em;
    cursor: pointer;
    transition: all var(--skb-transition);
    border-right: 1px solid var(--skb-border);
  }
  .input-mode-tab:last-child { border-right: none; }
  .input-mode-tab.active {
    background: var(--skb-secondary-muted);
    color: var(--skb-secondary);
  }
  .input-mode-tab:hover:not(.active) { color: var(--skb-text); }

  /* xpub input area */
  .xpub-input-area {
    display: none;
  }
  .xpub-input-area.active { display: block; }
  .seed-input-area { display: block; }
  .seed-input-area.hidden { display: none; }

  /* Descriptor output area */
  .descriptor-output-box {
    background: var(--skb-bg-input);
    font-family: var(--skb-mono);
    font-size: 0.88rem;
    color: var(--skb-text);
    padding: 14px;
    border-radius: var(--skb-radius-sm);
    border: 1px solid var(--skb-border);
    word-break: break-all;
    min-height: 60px;
    line-height: 1.6;
  }

  /* Hidden class */
  .hidden { display: none !important; }

  /* Print styles */
  @media print {
    #config-card, #entropy-card,
    .skb-header, .skb-breadcrumb, .skb-page-subtitle,
    .skb-scanner-box, .cosigner-header .skb-result-actions,
    .input-mode-tabs, .skb-passphrase-section .skb-result-actions,
    button, .skb-btn-primary, .skb-btn-sm, .skb-btn-secondary { display: none !important; }

    #print-descriptor-qr { display: block !important; }
    .skb-print-only { display: block !important; font-size: 1rem; margin: 0.75rem 0; }
    .skb-result { border: none !important; background: transparent; padding: 0; display: block !important; }
    .skb-card { box-shadow: none; border: 1px solid #ccc; }
    .skb-page-title { font-size: 1.3rem !important; color: black !important; }
    body { color: black !important; background: white !important; }
    .skb-card-title { color: black !important; }
    .descriptor-output-box { background: #f5f5f5 !important; color: black !important; border-color: #ccc !important; }
    .skb-table th { color: black !important; background: #eee !important; }
    .skb-table td { color: black !important; }
    .skb-qr-container { border: none !important; }

    #print-backup-ref { page-break-inside: avoid; break-inside: avoid; }
    #print-descriptor-qr { page-break-inside: avoid; break-inside: avoid; }
  }
</style>
</head>
<body>

<!-- Header -->
<header class="skb-header">
  <a href="../index.html" class="skb-brand">SafeKeep<span>Bitcoin</span></a>
  <div class="skb-header-actions">
    <button class="skb-theme-btn" onclick="toggleTheme()" id="theme-btn" title="Toggle theme">
      <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="5"/><path d="M12 1v2M12 21v2M4.22 4.22l1.42 1.42M18.36 18.36l1.42 1.42M1 12h2M21 12h2M4.22 19.78l1.42-1.42M18.36 5.64l1.42-1.42"/></svg>
    </button>
  </div>
</header>

<div class="skb-container">
  <h1 class="skb-page-title">Output Descriptor</h1>
  <div class="skb-page-subtitle">Build watch-only wallet descriptors from air-gapped entropy</div>

  <!-- Card 1: Wallet Configuration -->
  <div class="skb-card" id="config-card">
    <div class="skb-card-title">Wallet Configuration</div>

    <div class="skb-controls">
      <div class="skb-control-group">
        <label class="skb-label">Wallet Architecture</label>
        <select class="skb-select" id="wallet-type" onchange="updateUIState()">
          <option value="single">Single Signature</option>
          <option value="multi">Multi-Signature</option>
        </select>
      </div>
      <div class="skb-control-group">
        <label class="skb-label">Script Type</label>
        <select class="skb-select" id="script-type" onchange="updateUIState()">
          <option value="84">Native SegWit (BIP84 / bc1q)</option>
          <option value="86">Taproot (BIP86 / bc1p)</option>
          <option value="49">Nested SegWit (BIP49 / 3...)</option>
          <option value="44">Legacy (BIP44 / 1...)</option>
        </select>
      </div>
    </div>

    <!-- Multisig quorum config (hidden unless multi selected) -->
    <div id="multisig-config" class="skb-controls hidden" style="border: 1px solid rgba(3,218,198,0.2); background: var(--skb-secondary-muted); padding: 12px; border-radius: var(--skb-radius-sm);">
      <div class="skb-control-group">
        <label class="skb-label" style="color: var(--skb-secondary);">Signatures Required (m)</label>
        <select class="skb-select" id="m-required">
          <option value="1">1</option>
          <option value="2" selected>2</option>
          <option value="3">3</option>
          <option value="4">4</option>
          <option value="5">5</option>
        </select>
      </div>
      <div class="skb-control-group">
        <label class="skb-label" style="color: var(--skb-secondary);">Total Cosigners (n)</label>
        <select class="skb-select" id="n-total" onchange="updateUIState()">
          <option value="2">2</option>
          <option value="3" selected>3</option>
          <option value="4">4</option>
          <option value="5">5</option>
          <option value="6">6</option>
          <option value="7">7</option>
        </select>
      </div>
    </div>

    <div class="skb-data-row" style="margin-top: 0;">
      <div>
        <div class="skb-data-label">Derivation Path</div>
        <div class="skb-data-value" id="derivation-path" style="color: var(--skb-secondary);">m/84'/0'/0'</div>
      </div>
      <div style="font-size: 0.75rem; color: var(--skb-text-dim);">Auto-calculated · Mainnet</div>
    </div>
  </div>

  <!-- Card 2: Entropy Input -->
  <div class="skb-card" id="entropy-card">
    <div class="skb-card-title">Entropy Input</div>

    <div class="skb-controls" style="margin-bottom: 12px;">
      <div class="skb-control-group">
        <label class="skb-label">Seed Phrase Length</label>
        <div style="display: flex; gap: 16px; margin-top: 6px;">
          <label class="skb-checkbox-group"><input type="radio" name="seedLength" value="12" checked onchange="updateUIState()"> 12 Words</label>
          <label class="skb-checkbox-group"><input type="radio" name="seedLength" value="24" onchange="updateUIState()"> 24 Words</label>
        </div>
      </div>
    </div>

    <div id="seed-inputs-container"></div>

    <button class="skb-btn-primary" id="btn-generate">Generate Descriptor</button>
  </div>

  <!-- Card 3: Result (hidden until generated) -->
  <div id="result-box" style="display: none;">
    <div class="skb-card">
      <div class="skb-result">
        <div class="skb-result-header">
          <div class="skb-result-title">Output Descriptor</div>
          <div class="skb-result-actions">
            <button class="skb-btn-sm" id="btn-copy" onclick="copyDescriptor()">Copy</button>
            <button class="skb-btn-sm" id="btn-save" onclick="saveDescriptorToFile()">Save</button>
            <button class="skb-btn-sm" id="btn-show-qr" onclick="toggleDescriptorQR()">Show QR</button>
            <button class="skb-btn-sm" onclick="printDescriptor()">Print</button>
          </div>
        </div>

        <!-- QR Code (hidden by default, toggleable) -->
        <div id="descriptor-qr-container" class="skb-qr-container">
          <canvas id="descriptor-qr-canvas"></canvas>
        </div>

        <!-- Print-only QR (pre-rendered for print) -->
        <div id="print-descriptor-qr" class="skb-print-only" style="display: none; text-align: center; margin: 12px 0;">
          <canvas id="print-qr-canvas"></canvas>
        </div>

        <!-- Print-only backup reference -->
        <div id="print-backup-ref" class="skb-print-only" style="display: none;"></div>

        <div style="margin-bottom: 12px;">
          <div class="skb-data-label" style="margin-bottom: 6px;">Raw Output Descriptor</div>
          <div class="descriptor-output-box" id="descriptor-text"></div>
        </div>

        <div>
          <div class="skb-data-label" style="margin-bottom: 6px;">Address Verification (first 5 receive)</div>
          <table class="skb-table" id="address-table">
            <thead><tr><th>Path</th><th>Address</th></tr></thead>
            <tbody id="address-output"></tbody>
          </table>
        </div>
      </div>
    </div>
  </div>

  <div class="skb-breadcrumb">
    <a href="../index.html">&larr; SafeKeepBitcoin Home</a>
  </div>
</div>

// =========================================================
// 1. AUTOCOMPLETE & VALIDATION
// =========================================================
function closeAllLists(elmnt) {
    document.querySelectorAll('.skb-autocomplete-list').forEach(list => {
        if (elmnt !== list) list.remove();
    });
}
document.addEventListener("click", e => closeAllLists(e.target));

window.validateWord = function(input) {
    const val = input.value.trim().toLowerCase();
    const wordBox = input.closest('.skb-word-box');
    if (val === '') { wordBox.classList.remove('invalid'); return false; }
    if (!WORDLIST.includes(val)) { wordBox.classList.add('invalid'); return false; }
    wordBox.classList.remove('invalid'); return true;
};

function attachAutocompleteEvents() {
    const allInputs = document.querySelectorAll('.word-input');
    // Clone to remove old listeners
    allInputs.forEach(input => {
        const clone = input.cloneNode(true);
        input.parentNode.replaceChild(clone, input);
    });

    const inputs = document.querySelectorAll('.word-input');
    inputs.forEach((input, index) => {
        input.addEventListener('input', function() {
            let val = this.value.toLowerCase();
            closeAllLists();
            window.validateWord(this);
            if (!val) return;

            let list = document.createElement("DIV");
            list.setAttribute("class", "skb-autocomplete-list");
            list.style.display = "block";
            this.parentNode.appendChild(list);

            let matches = 0;
            for (let i = 0; i < WORDLIST.length; i++) {
                if (WORDLIST[i].substr(0, val.length) === val) {
                    let item = document.createElement("DIV");
                    item.setAttribute("class", "skb-autocomplete-item");
                    item.innerHTML = "<strong>" + WORDLIST[i].substr(0, val.length) + "</strong>" + WORDLIST[i].substr(val.length) + "<input type='hidden' value='" + WORDLIST[i] + "'>";
                    item.addEventListener("click", function(e) {
                        input.value = this.getElementsByTagName("input")[0].value;
                        window.validateWord(input);
                        closeAllLists();
                        // Focus next input within same seed grid
                        const nextInput = inputs[index + 1];
                        if (nextInput && nextInput.closest('.skb-seed-grid') === input.closest('.skb-seed-grid')) {
                            nextInput.focus();
                        }
                    });
                    list.appendChild(item);
                    matches++;
                }
            }
            if (matches > 0) list.firstChild.classList.add('active-suggestion');
        });

        input.addEventListener('keydown', function(e) {
            let list = this.parentNode.querySelector('.skb-autocomplete-list');
            if (list && list.style.display === 'block' && e.key === 'Tab') {
                e.preventDefault();
                const firstItem = list.firstChild;
                if (firstItem) {
                    this.value = firstItem.getElementsByTagName("input")[0].value;
                    window.validateWord(this);
                    closeAllLists();
                    const nextInput = inputs[index + 1];
                    if (nextInput && nextInput.closest('.skb-seed-grid') === input.closest('.skb-seed-grid')) {
                        nextInput.focus();
                    }
                }
            }
        });

        input.addEventListener('paste', function(e) {
            e.preventDefault();
            const pasteData = (e.clipboardData || window.clipboardData).getData('text');
            const words = pasteData.trim().split(/[\s\n]+/);

            const gridEl = this.closest('.skb-seed-grid');
            const blockIndex = parseInt(gridEl.dataset.blockIndex);

            // Auto-adjust 12/24 if needed
            const global12 = document.querySelector('input[name="seedLength"][value="12"]');
            const global24 = document.querySelector('input[name="seedLength"][value="24"]');

            if (words.length === 24 && global12.checked) {
                global24.checked = true;
                updateUIState();
                setTimeout(() => fillPastedWords(words, blockIndex, 0), 10);
                return;
            } else if (words.length === 12 && global24.checked) {
                global12.checked = true;
                updateUIState();
                setTimeout(() => fillPastedWords(words, blockIndex, 0), 10);
                return;
            }

            const blockInputs = gridEl.querySelectorAll('.word-input');
            let localIndex = Array.from(blockInputs).indexOf(this);
            fillPastedWords(words, blockIndex, localIndex);
        });
    });
}

function fillPastedWords(words, blockIndex, startIndex) {
    const grid = document.querySelector(`.skb-seed-grid[data-block-index="${blockIndex}"]`);
    if (!grid) return;
    const inputs = grid.querySelectorAll('.word-input');
    words.forEach((word, i) => {
        if (startIndex + i < inputs.length) {
            const targetInput = inputs[startIndex + i];
            targetInput.value = word.toLowerCase();
            window.validateWord(targetInput);
        }
    });
    const nextIndex = Math.min(startIndex + words.length, inputs.length - 1);
    if (inputs[nextIndex]) inputs[nextIndex].focus();
    closeAllLists();
}


// =========================================================
// 2. QR SCANNER (per-cosigner)
// =========================================================
let activeHtml5QrCode = null;
let activeScannerIndex = null;

window.toggleScanner = function(index) {
    const container = document.getElementById(`scanner-${index}`);

    if (activeScannerIndex === index && activeHtml5QrCode) {
        activeHtml5QrCode.stop().then(() => {
            activeHtml5QrCode.clear();
            activeHtml5QrCode = null;
            container.classList.remove('visible');
            activeScannerIndex = null;
        }).catch(console.error);
        return;
    }

    if (activeHtml5QrCode) {
        activeHtml5QrCode.stop().then(() => {
            activeHtml5QrCode.clear();
            const prevContainer = document.getElementById(`scanner-${activeScannerIndex}`);
            if (prevContainer) prevContainer.classList.remove('visible');
            startScannerForBlock(index, container);
        }).catch(console.error);
    } else {
        startScannerForBlock(index, container);
    }
};

function startScannerForBlock(index, container) {
    if (!window.Html5Qrcode) {
        alert("Scanner library not loaded.");
        return;
    }

    container.classList.add('visible');
    activeScannerIndex = index;
    activeHtml5QrCode = new window.Html5Qrcode(`reader-${index}`);

    activeHtml5QrCode.start(
        { facingMode: "environment" },
        { fps: 10, qrbox: { width: 250, height: 250 } },
        (decodedText) => {
            window.toggleScanner(index);

            // Check if this is an xpub/xpub-like key
            if (decodedText.match(/^[xyzXYZtuvTUV]pub[0-9A-Za-z]+$/)) {
                // Fill xpub field
                const xpubInput = document.getElementById(`xpub-${index}`);
                if (xpubInput) {
                    xpubInput.value = decodedText;
                    // Switch to xpub mode
                    switchInputMode(index, 'xpub');
                }
                return;
            }

            // Otherwise treat as seed words
            const words = decodedText.trim().split(/[\s\n]+/);
            const global12 = document.querySelector('input[name="seedLength"][value="12"]');
            const global24 = document.querySelector('input[name="seedLength"][value="24"]');

            if (words.length === 24 && global12.checked) {
                global24.checked = true;
                updateUIState();
                setTimeout(() => fillPastedWords(words, index, 0), 50);
            } else if (words.length === 12 && global24.checked) {
                global12.checked = true;
                updateUIState();
                setTimeout(() => fillPastedWords(words, index, 0), 50);
            } else {
                fillPastedWords(words, index, 0);
            }
        },
        (error) => { /* ignore frame errors */ }
    ).catch(err => {
        alert(`Camera access failed: ${err.message}`);
        container.classList.remove('visible');
        activeScannerIndex = null;
    });
}

// 3. LOAD FROM FILE / SESSION (per-cosigner)
// =========================================================
window.loadSeedFromFile = async function(index) {
    if (!window.SeedManager) {
        alert("SeedManager not available.");
        return;
    }
    try {
        const result = await window.SeedManager.loadSeed();
        if (!result) return;

        const words = result.mnemonic.trim().split(/\s+/);

        // Auto-adjust seed length
        const global12 = document.querySelector('input[name="seedLength"][value="12"]');
        const global24 = document.querySelector('input[name="seedLength"][value="24"]');
        if (words.length === 24 && global12.checked) {
            global24.checked = true;
            updateUIState();
            setTimeout(() => {
                fillPastedWords(words, index, 0);
                if (result.passphrase) {
                    const ppInput = document.getElementById(`passphrase-${index}`);
                    if (ppInput) ppInput.value = result.passphrase;
                }
                updateCosignerFingerprint(index);
            }, 10);
        } else if (words.length === 12 && global24.checked) {
            global12.checked = true;
            updateUIState();
            setTimeout(() => {
                fillPastedWords(words, index, 0);
                if (result.passphrase) {
                    const ppInput = document.getElementById(`passphrase-${index}`);
                    if (ppInput) ppInput.value = result.passphrase;
                }
                updateCosignerFingerprint(index);
            }, 10);
        } else {
            fillPastedWords(words, index, 0);
            if (result.passphrase) {
                const ppInput = document.getElementById(`passphrase-${index}`);
                if (ppInput) ppInput.value = result.passphrase;
            }
            updateCosignerFingerprint(index);
        }
    } catch (e) {
        alert(`Could not load seed: ${e.message}`);
    }
};

window.loadPassphraseFromFile = async function(index) {
    if (!window.SeedManager) return;
    try {
        const result = await window.SeedManager.loadPassphrase();
        if (result) {
            const ppInput = document.getElementById(`passphrase-${index}`);
            if (ppInput) ppInput.value = result.passphrase;
        }
    } catch (e) {
        alert(`Could not load passphrase: ${e.message}`);
    }
};


// =========================================================
// 4. INPUT MODE SWITCHING (seed words vs xpub)
// =========================================================
window.switchInputMode = function(index, mode) {
    const seedArea = document.getElementById(`seed-area-${index}`);
    const xpubArea = document.getElementById(`xpub-area-${index}`);
    const seedTab = document.getElementById(`tab-seed-${index}`);
    const xpubTab = document.getElementById(`tab-xpub-${index}`);

    if (mode === 'xpub') {
        seedArea.classList.add('hidden');
        xpubArea.classList.add('active');
        seedTab.classList.remove('active');
        xpubTab.classList.add('active');
    } else {
        seedArea.classList.remove('hidden');
        xpubArea.classList.remove('active');
        seedTab.classList.add('active');
        xpubTab.classList.remove('active');
    }
};


// =========================================================
// 5. COSIGNER FINGERPRINT PREVIEW
// =========================================================
async function updateCosignerFingerprint(index) {
    const grid = document.querySelector(`.skb-seed-grid[data-block-index="${index}"]`);
    if (!grid) return;
    const wordInputs = grid.querySelectorAll('.word-input');
    const words = Array.from(wordInputs).map(inp => inp.value.trim().toLowerCase());
    if (words.some(w => w === '' || !WORDLIST.includes(w))) return;

    try {
        const fp = await window.SeedManager.computeFingerprint(words.join(' '));
        const fpEl = document.getElementById(`cosigner-fp-${index}`);
        if (fpEl) fpEl.textContent = fp;
    } catch (e) { /* silent */ }
}

function updateUIState() {

    const seedContainer = document.getElementById('seed-inputs-container');

    // Taproot not available for multisig (no wallet support yet)
    const scriptSelect = document.getElementById('script-type');
    const taprootOption = scriptSelect.querySelector('option[value="86"]');
    if (isMulti) {
        taprootOption.disabled = true;
        if (scriptType === '86') {
            scriptSelect.value = '84';

    } else {
        taprootOption.disabled = false;

    const activeScriptType = scriptSelect.value;

    // Derivation path
    const coinType = "0'";

        let scriptIndicator = "2'"; // native segwit
        if (activeScriptType === '49') scriptIndicator = "1'";
        else if (activeScriptType === '44') scriptIndicator = "0'";
        derivationPath = `m/48'/${coinType}/0'/${scriptIndicator}`;
    } else {
        derivationPath = `m/${activeScriptType}'/${coinType}/0'`;
    }
    document.getElementById('derivation-path').textContent = derivationPath;

    // Show/hide multisig config
    if (isMulti) {
        multisigConfig.classList.remove('hidden');

        multisigConfig.classList.add('hidden');

        const label = isMulti ? `Cosigner ${i + 1}` : `Seed Phrase`;

        let gridHtml = `<div class="skb-seed-grid" data-block-index="${i}">`;

                    <span class="word-num">${w + 1}.</span>
                    <input type="text" class="word-input" autocomplete="off">
                </div>`;
        }
        gridHtml += `</div>`;

        html += `
            <div class="cosigner-block">
                <div class="cosigner-header">
                    <span class="cosigner-label">${label}</span>
                    <span class="cosigner-fingerprint" id="cosigner-fp-${i}"></span>

                <!-- Input mode tabs -->
                <div class="input-mode-tabs">
                    <button class="input-mode-tab active" id="tab-seed-${i}" onclick="switchInputMode(${i}, 'seed')">Seed Words</button>
                    <button class="input-mode-tab" id="tab-xpub-${i}" onclick="switchInputMode(${i}, 'xpub')">xpub Key</button>
                </div>

                <!-- Seed words input -->
                <div id="seed-area-${i}" class="seed-input-area">
                    <div class="skb-result-actions" style="margin-bottom: 10px; flex-wrap: wrap; gap: 8px;">
                        <button class="skb-btn-sm" onclick="loadSeedFromFile(${i})">Load from File</button>
                        <button class="skb-btn-sm" onclick="toggleScanner(${i})">Scan QR</button>

                    ${gridHtml}

                    <!-- Passphrase -->
                    <div class="skb-passphrase-section" style="margin-top: 8px;">
                        <div class="skb-passphrase-label">${isMulti ? `Cosigner ${i + 1} Passphrase` : 'Optional Passphrase (BIP-39)'}</div>
                        <div class="skb-passphrase-row">
                            <input type="text" class="skb-passphrase-input" id="passphrase-${i}" placeholder="Leave blank if none" autocomplete="off">
                        </div>
                        <div class="skb-result-actions" style="margin-top: 8px;">
                            <button class="skb-btn-sm" onclick="loadPassphraseFromFile(${i})">Load Passphrase</button>
                        </div>
                    </div>
                </div>

                <!-- xpub input (alternative) -->
                <div id="xpub-area-${i}" class="xpub-input-area">
                    <div class="skb-result-actions" style="margin-bottom: 10px; flex-wrap: wrap; gap: 8px;">
                        <button class="skb-btn-sm" onclick="toggleScanner(${i})">Scan xpub QR</button>
                    </div>
                    <div style="margin-bottom: 6px;">
                        <label class="skb-label">Extended Public Key</label>
                    </div>
                    <input type="text" class="skb-input" id="xpub-${i}" placeholder="xpub6... or zpub1... or Zpub1..." style="font-family: var(--skb-mono); font-size: 0.82rem;" autocomplete="off">
                    <div style="margin-top: 6px;">
                        <label class="skb-label">Master Fingerprint (optional, 8 hex chars)</label>
                    </div>
                    <input type="text" class="skb-input" id="xpub-fp-${i}" placeholder="e.g. 3F8A21D7 (optional)" maxlength="8" style="font-family: var(--skb-mono); width: 160px;" autocomplete="off">
                    <div style="font-size: 0.75rem; color: var(--skb-text-dim); margin-top: 6px;">
                        Use this mode if you already have an xpub from a hardware wallet or Sparrow. Fingerprint is optional — leave blank if unknown.
                    </div>
                </div>

                <!-- Per-cosigner scanner -->
                <div id="scanner-${i}" class="skb-scanner-box">
                    <div id="reader-${i}"></div>
                    <div style="margin-top: 8px; font-weight: 600; font-size: 0.85rem; color: var(--skb-info);">Awaiting QR Code...</div>
                    <button class="skb-btn-sm" style="margin-top: 10px; border-color: var(--skb-danger); color: var(--skb-danger);" onclick="toggleScanner(${i})">Cancel Scan</button>
                </div>
            </div>`;
    }
    seedContainer.innerHTML = html;

    attachAutocompleteEvents();

    // Clamp m <= n
    if (isMulti) {
        const mSelect = document.getElementById('m-required');
        const mVal = parseInt(mSelect.value);
        if (mVal > nTotal) mSelect.value = nTotal;
        Array.from(mSelect.options).forEach(opt => {
            opt.disabled = parseInt(opt.value) > nTotal;
        });
    }

    // Hide results when config changes
    document.getElementById('result-box').style.display = 'none';
}


// =========================================================
// 7. DESCRIPTOR CHECKSUM (BIP-380)
// =========================================================
function descriptorChecksum(desc) {
    const INPUT_CHARSET = "0123456789()[],'/*abcdefgh@:$%{}IJKLMNOPQRSTUVWXYZ&+-.;<=>?!^_|~ijklmnopqrstuvwxyzABCDEFGH`#\"\\ ";
    const CHECKSUM_CHARSET = "qpzry9x8gf2tvdw0s3jn54khce6mua7l";
    const GENERATOR = [0xf5dee51989n, 0xa9fdca3312n, 0x1bab10e32dn, 0x3706b1677an, 0x644d626ffdn];

    function polymod(c, val) {
        let c0 = c >> 35n;
        c = ((c & 0x7ffffffffn) << 5n) ^ BigInt(val);
        if (c0 & 1n) c ^= GENERATOR[0];
        if (c0 & 2n) c ^= GENERATOR[1];
        if (c0 & 4n) c ^= GENERATOR[2];
        if (c0 & 8n) c ^= GENERATOR[3];
        if (c0 & 16n) c ^= GENERATOR[4];
        return c;
    }

    let c = 1n;
    let cls = 0;
    let clscount = 0;
    for (let ch of desc) {
        let pos = INPUT_CHARSET.indexOf(ch);
        if (pos === -1) return "";
        c = polymod(c, pos & 31);
        cls = cls * 3 + (pos >> 5);
        clscount++;
        if (clscount === 3) {
            c = polymod(c, cls);
            cls = 0;
            clscount = 0;
        }
    }
    if (clscount > 0) c = polymod(c, cls);
    for (let j = 0; j < 8; j++) c = polymod(c, 0);
    c ^= 1n;

    let ret = "";
    for (let j = 0; j < 8; j++) {
        ret += CHECKSUM_CHARSET[Number((c >> (5n * BigInt(7 - j))) & 31n)];
    }
    return ret;
}


// =========================================================
// 8. SLIP-132 VERSION BYTES
// =========================================================
const SLIP132 = {
    mainnet: {
        '84': { public: 0x04b24746 },
        '86': { public: 0x0488b21e },
        '49': { public: 0x049d7cb2 },
        '44': { public: 0x0488b21e },
        '48_2': { public: 0x02aa7ed3 },
        '48_1': { public: 0x0295b43f }
    }
};


// =========================================================
// 9. GENERATE DESCRIPTOR
// =========================================================
let currentWalletData = null;

async function generateDescriptor() {
    const btn = document.getElementById('btn-generate');
    const resultBox = document.getElementById('result-box');
    const outputText = document.getElementById('descriptor-text');
    const addressOutput = document.getElementById('address-output');

    if (!window.BtcMath || !window.QRCode) {
        resultBox.style.display = 'block';
        outputText.innerHTML = '<span style="color:var(--skb-danger)">Error: Cryptography library not loaded.</span>';
        return;
    }

    btn.disabled = true;
    btn.innerText = "Processing...";
    resultBox.style.display = 'block';

    try {
        const { bip39, HDKey, btc } = window.BtcMath;

        const walletType = document.getElementById('wallet-type').value;
        const scriptType = document.getElementById('script-type').value;
        const isMulti = walletType === 'multi';
        const mReq = isMulti ? parseInt(document.getElementById('m-required').value) : 1;
        const derivationPath = document.getElementById('derivation-path').textContent;
        const networkObj = btc.NETWORK;

        const networkBytes = SLIP132['mainnet']['44'];
        const nTotal = isMulti ? parseInt(document.getElementById('n-total').value) : 1;
        const keyOrigins = [];
        const keystores = [];
        const accountNodes = [];
        const cosignerMeta = []; // For print backup reference

        for (let i = 0; i < nTotal; i++) {
            // Check if using xpub mode
            const xpubArea = document.getElementById(`xpub-area-${i}`);
            const isXpubMode = xpubArea && xpubArea.classList.contains('active');

            if (isXpubMode) {
                // xpub mode — directly use the provided extended key
                const xpubVal = document.getElementById(`xpub-${i}`).value.trim();
                const fpRaw = document.getElementById(`xpub-fp-${i}`).value.trim().toUpperCase();

                if (!xpubVal) throw new Error(`Cosigner ${i + 1}: please enter an xpub key.`);

                // Fingerprint is optional — default to 00000000 if blank
                let fpVal = '00000000';
                if (fpRaw) {
                    if (!/^[0-9A-F]{8}$/.test(fpRaw)) throw new Error(`Cosigner ${i + 1}: fingerprint must be 8 hex characters (or leave blank).`);
                    fpVal = fpRaw;
                }

                const cleanPath = derivationPath.replace('m/', '');
                keyOrigins.push(`[${fpVal.toLowerCase()}/${cleanPath}]${xpubVal}`);

                // Decode xpub for address derivation
                const accountNode = HDKey.fromExtendedKey(xpubVal);
                accountNodes.push(accountNode);

                keystores.push({
                    type: "readonly",
                    source: "xpub",
                    derivation: derivationPath,
                    masterFingerprint: fpVal,
                    xpub: xpubVal
                });

                cosignerMeta.push({ index: i + 1, fingerprint: fpRaw ? fpVal : 'Unknown', lastWord: '(xpub)', passphrase: '' });

            } else {
                // Seed words mode
                const grid = document.querySelector(`.skb-seed-grid[data-block-index="${i}"]`);
                const wordInputs = grid.querySelectorAll('.word-input');
                const words = [];
                wordInputs.forEach(inp => words.push(inp.value.trim().toLowerCase()));

                if (words.some(w => w === '')) throw new Error(`Seed phrase ${i + 1} is incomplete.`);

                const passphrase = document.getElementById(`passphrase-${i}`).value.trim();
                const lastWord = words[words.length - 1];

                const seedMnemonic = words.join(' ');
                const seedBytes = await bip39.mnemonicToSeed(seedMnemonic, passphrase);

                const rootNode = HDKey.fromMasterSeed(seedBytes, { public: 0x0488b21e, private: 0x0488ade4 });
                const fingerprint = rootNode.fingerprint.toString(16).padStart(8, '0');

                const accountNode = rootNode.derive(derivationPath);
                accountNode.versions = networkBytes;
                const extPubKey = accountNode.publicExtendedKey;

                accountNodes.push(accountNode);

                const cleanPath = derivationPath.replace('m/', '');
                keyOrigins.push(`[${fingerprint}/${cleanPath}]${extPubKey}`);

                keystores.push({
                    type: "readonly",
                    source: "bip39",
                    derivation: derivationPath,
                    masterFingerprint: fingerprint.toUpperCase(),
                    xpub: extPubKey
                });

                cosignerMeta.push({
                    index: i + 1,
                    fingerprint: fingerprint.toUpperCase(),
                    lastWord: lastWord,
                    passphrase: passphrase
                });
            }
        }

        // Build descriptor body
        let descriptorBody = "";
        let jsonScriptType = "";

        if (isMulti) {
            const keysStr = keyOrigins.map(k => `${k}/<0;1>/*`).join(',');
            descriptorBody = `sortedmulti(${mReq},${keysStr})`;

            if (scriptType === '84') {
                descriptorBody = `wsh(${descriptorBody})`;
                jsonScriptType = "p2wsh";
            } else if (scriptType === '49') {
                descriptorBody = `sh(wsh(${descriptorBody}))`;
                jsonScriptType = "p2sh-p2wsh";
            } else if (scriptType === '44') {
                // Legacy multisig
                descriptorBody = `sh(${descriptorBody})`;
                jsonScriptType = "p2sh";
            }
        } else {
            const keyStr = `${keyOrigins[0]}/<0;1>/*`;
            if (scriptType === '84') {
                descriptorBody = `wpkh(${keyStr})`;
                jsonScriptType = "p2wpkh";
            } else if (scriptType === '86') {
                descriptorBody = `tr(${keyStr})`;
                jsonScriptType = "p2tr";
            } else if (scriptType === '49') {
                descriptorBody = `sh(wpkh(${keyStr}))`;
                jsonScriptType = "p2sh-p2wpkh";
            } else if (scriptType === '44') {
                descriptorBody = `pkh(${keyStr})`;
                jsonScriptType = "p2pkh";
            }
        }

        const checksum = descriptorChecksum(descriptorBody);
        const finalDescriptor = `${descriptorBody}#${checksum}`;

        outputText.textContent = finalDescriptor;

        // Store wallet data for save
        currentWalletData = {
            name: isMulti ? `SafeKeep ${mReq}-of-${nTotal}` : 'SafeKeep Single',
            descriptor: finalDescriptor,
            policyType: isMulti ? 'multi' : 'single',
            scriptType: jsonScriptType,
            quorum: isMulti ? { m: mReq, n: nTotal } : { m: 1, n: 1 },
            derivationPath: derivationPath,
            keystores: keystores,
            network: 'mainnet',
            cosignerMeta: cosignerMeta
        };

        // Render QR for print (always, so it's ready)
        const printCanvas = document.getElementById('print-qr-canvas');
        window.QRCode.toCanvas(printCanvas, finalDescriptor, {
            width: 400,
            errorCorrectionLevel: 'L',
            color: { dark: '#000000', light: '#ffffff' }
        });

        // Build print backup reference
        const printRef = document.getElementById('print-backup-ref');
        let refHtml = '<div style="margin: 16px 0; padding: 12px; border: 1px solid #ccc; border-radius: 6px;">';
        refHtml += `<div style="font-weight: 700; margin-bottom: 8px; text-transform: uppercase; font-size: 0.85rem;">Backup Reference</div>`;
        if (isMulti) {
            refHtml += `<div style="margin-bottom: 8px;"><strong>Quorum:</strong> ${mReq} of ${nTotal}</div>`;
        }
        cosignerMeta.forEach(cm => {
            refHtml += `<div style="margin-bottom: 6px; padding-left: 10px; border-left: 2px solid #999;">`;
            refHtml += `<strong>${isMulti ? 'Cosigner ' + cm.index : 'Seed'}:</strong> `;
            refHtml += `Fingerprint <span style="font-family: monospace;">${cm.fingerprint}</span>`;
            refHtml += ` — Last word: <span style="font-family: monospace; text-transform: uppercase;">${cm.lastWord}</span>`;
            if (cm.passphrase) {
                refHtml += `<br><strong>Passphrase:</strong> <span style="font-family: monospace;">${cm.passphrase}</span>`;
            }
            refHtml += `</div>`;
        });
        refHtml += '</div>';
        printRef.innerHTML = refHtml;

        // Generate addresses
        let addressHTML = "";
        for (let i = 0; i < 5; i++) {
            try {
                let address = "";
                let childPubkeys = [];

                for (let j = 0; j < accountNodes.length; j++) {
                    const childNode = accountNodes[j].deriveChild(0).deriveChild(i);
                    childPubkeys.push(childNode.publicKey);
                }

                if (isMulti) {
                    childPubkeys.sort((a, b) => {
                        for (let k = 0; k < Math.min(a.length, b.length); k++) {
                            if (a[k] !== b[k]) return a[k] - b[k];
                        }
                        return a.length - b.length;
                    });

                    if (scriptType === '84') {
                        const ms = btc.p2ms(mReq, childPubkeys);
                        address = btc.p2wsh(ms, networkObj).address;
                    } else if (scriptType === '49') {
                        const ms = btc.p2ms(mReq, childPubkeys);
                        const wsh = btc.p2wsh(ms);
                        address = btc.p2sh(wsh, networkObj).address;
                    } else if (scriptType === '44') {
                        const ms = btc.p2ms(mReq, childPubkeys);
                        address = btc.p2sh(ms, networkObj).address;
                    }
                } else {
                    const pubkey = childPubkeys[0];
                    if (scriptType === '84') {
                        address = btc.p2wpkh(pubkey, networkObj).address;
                    } else if (scriptType === '86') {
                        const xOnlyPub = pubkey.slice(1, 33);
                        address = btc.p2tr(xOnlyPub, undefined, networkObj).address;
                    } else if (scriptType === '49') {
                        const inner = btc.p2wpkh(pubkey);
                        address = btc.p2sh(inner, networkObj).address;
                    } else if (scriptType === '44') {
                        address = btc.p2pkh(pubkey, networkObj).address;
                    }
                }

                addressHTML += `<tr><td style="color: var(--skb-text-muted);">m/0/${i}</td><td>${address}</td></tr>`;
            } catch (addrErr) {
                console.error(addrErr);
                addressHTML += `<tr><td style="color: var(--skb-text-muted);">m/0/${i}</td><td style="color: var(--skb-danger);">Preview unavailable</td></tr>`;
            }
        }
        addressOutput.innerHTML = addressHTML;

        // Set active session
        if (window.SeedSession && !isMulti && cosignerMeta[0] && cosignerMeta[0].lastWord !== '(xpub)') {
            // For single-sig from seed words, update session
            const grid = document.querySelector('.skb-seed-grid[data-block-index="0"]');
            const wordInputs = grid.querySelectorAll('.word-input');
            const words = Array.from(wordInputs).map(inp => inp.value.trim().toLowerCase());
            window.SeedSession.set({
                mnemonic: words.join(' '),
                fingerprint: cosignerMeta[0].fingerprint,
                passphrase: document.getElementById('passphrase-0').value.trim(),
                wordCount: words.length,
                keyFormat: 'slip132',
                addressType: scriptType
            });
        }

    } catch (err) {
        outputText.innerHTML = `<span style="color: var(--skb-danger);">Error: ${err.message}</span>`;
        addressOutput.innerHTML = `<tr><td colspan="2" style="color: var(--skb-danger);">Fix errors above to see addresses.</td></tr>`;
    } finally {
        btn.disabled = false;
        btn.innerText = "Generate Descriptor";
    }
}


// =========================================================
// 10. COPY / SAVE / QR / PRINT
// =========================================================
window.copyDescriptor = function() {
    const text = document.getElementById('descriptor-text').textContent;
    if (!text || text.includes("Error")) return;

    navigator.clipboard.writeText(text).then(() => {
        const btn = document.getElementById('btn-copy');
        const orig = btn.innerText;
        btn.innerText = 'Copied!';
        setTimeout(() => btn.innerText = orig, 1800);
    });
};

window.toggleDescriptorQR = function() {
    const container = document.getElementById('descriptor-qr-container');
    const btn = document.getElementById('btn-show-qr');
    const text = document.getElementById('descriptor-text').textContent;
    if (!text || text.includes("Error")) return;

    if (container.classList.contains('visible')) {
        container.classList.remove('visible');
        btn.textContent = 'Show QR';
    } else {
        // Render QR
        const canvas = document.getElementById('descriptor-qr-canvas');
        window.QRCode.toCanvas(canvas, text, {
            width: 500,
            errorCorrectionLevel: 'L',
            color: { dark: '#000000', light: '#ffffff' }
        });
        container.classList.add('visible');
        btn.textContent = 'Hide QR';
    }
};

window.saveDescriptorToFile = async function() {
    if (!currentWalletData) {
        alert("Please generate a descriptor first.");
        return;
    }

    // Build standard Bitcoin Core / Sparrow output descriptor text file
    // The BIP389 combined descriptor uses <0;1>/* (what we generate)
    // Bitcoin Core needs separate receive (/0/*) and change (/1/*) descriptors

    // Strip existing checksum to get the body
    const combinedBody = currentWalletData.descriptor.replace(/#[a-z0-9]+$/, '');

    // Convert to h-notation (Bitcoin Core standard) before computing checksums
    function toH(s) { return s.replace(/'/g, 'h'); }

    const combinedH = toH(combinedBody);
    const combinedDesc = `${combinedH}#${descriptorChecksum(combinedH)}`;

    // Receive: replace <0;1>/* with 0/*
    const receiveH = combinedH.replace(/<0;1>\/\*/g, '0/*');
    const receiveDesc = `${receiveH}#${descriptorChecksum(receiveH)}`;

    // Change: replace <0;1>/* with 1/*
    const changeH = combinedH.replace(/<0;1>\/\*/g, '1/*');
    const changeDesc = `${changeH}#${descriptorChecksum(changeH)}`;

    const fileLines = [
        `# Receive and change descriptor (BIP389):`,
        combinedDesc,
        ``,
        ``,
        `# Receive descriptor (Bitcoin Core):`,
        receiveDesc,
        ``,
        `# Change descriptor (Bitcoin Core):`,
        changeDesc,
        ``
    ];
    const fileContent = fileLines.join('\n');
    const suggestedName = `${currentWalletData.name.replace(/\s+/g, '-')}_Descriptor.txt`;

    if (window.showSaveFilePicker) {
        try {
            const pickerOpts = {
                suggestedName: suggestedName,
                types: [{ description: 'Output Descriptor', accept: { 'text/plain': ['.txt'] } }]
            };
            const fileHandle = await window.showSaveFilePicker(pickerOpts);
            const writable = await fileHandle.createWritable();
            await writable.write(fileContent);
            await writable.close();
        } catch (e) {
            if (e.name === 'AbortError') return;
            throw e;
        }
    } else {
        // Fallback blob download
        const blob = new Blob([fileContent], { type: 'text/plain' });
        const url = URL.createObjectURL(blob);
        const a = document.createElement('a');
        a.href = url;
        a.download = suggestedName;
        a.click();
        URL.revokeObjectURL(url);
    }
};

window.printDescriptor = function() {
    if (!currentWalletData) return;
    document.title = `${currentWalletData.name} — Output Descriptor`;
    window.print();
    document.title = 'Output Descriptor — SafeKeepBitcoin';
};

window.toggleTheme = function() {
    const html = document.documentElement;
    const currentTheme = html.getAttribute('data-theme');
    const btn = document.getElementById('theme-btn');

    if (currentTheme === 'light') {
        html.removeAttribute('data-theme');
        localStorage.setItem('safekeepTheme', 'dark');
        btn.innerHTML = '<svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="5"/><path d="M12 1v2M12 21v2M4.22 4.22l1.42 1.42M18.36 18.36l1.42 1.42M1 12h2M21 12h2M4.22 19.78l1.42-1.42M18.36 5.64l1.42-1.42"/></svg>';
    } else {
        html.setAttribute('data-theme', 'light');
        localStorage.setItem('safekeepTheme', 'light');
        btn.innerHTML = '<svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/></svg>';
    }
};


// =========================================================
// 12. INIT
// =========================================================
document.addEventListener('DOMContentLoaded', async () => {
    // Theme icon
    if (localStorage.getItem('safekeepTheme') === 'light') {
        document.getElementById('theme-btn').innerHTML = '<svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/></svg>';
    }

    // Build initial UI
    updateUIState();

    // Wire generate button
    document.getElementById('btn-generate').addEventListener('click', generateDescriptor);

    // Try to auto-load session seed into first cosigner
    if (window.SeedSession) {
        const sessionSeed = await window.SeedSession.init();
        if (sessionSeed && sessionSeed.mnemonic) {
            const words = sessionSeed.mnemonic.trim().split(/\s+/);

            // Auto-adjust seed length
            const global12 = document.querySelector('input[name="seedLength"][value="12"]');
            const global24 = document.querySelector('input[name="seedLength"][value="24"]');
            if (words.length === 24 && global12.checked) {
                global24.checked = true;
                updateUIState();
            } else if (words.length === 12 && global24.checked) {
                global12.checked = true;
                updateUIState();
            }

            // Fill first cosigner with session seed
            setTimeout(() => {
                fillPastedWords(words, 0, 0);
                if (sessionSeed.passphrase) {
                    const ppInput = document.getElementById('passphrase-0');
                    if (ppInput) ppInput.value = sessionSeed.passphrase;
                }
                updateCosignerFingerprint(0);
            }, 50);
        }
    }
});
