<style>
  /* --- Dark Theme (Default) --- */
  :root {
    --bg: #0f0f0f;
    --card: #161616;
    --card2: #1c1c1c;
    --border: #2a2a2a;
    --orange: #f7931a;
    --teal: #03dac6;
    --red: #cf6679;
    --muted: #888;
    --text: #e0e0e0;
    --mono: 'Courier New', Courier, monospace;
    --input-bg: #2c2c2c;
  }

  /* --- Light Theme Overrides --- */
  [data-theme="light"] {
    --bg: #f5f5f7;
    --card: #ffffff;
    --card2: #f0f0f0;
    --border: #cccccc;
    --text: #121212;
    --muted: #555555;
    --teal: #018786;
    --red: #b00020;
    --input-bg: #e0e0e0;
    --orange: #d87c14;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { background: var(--bg); color: var(--text); font-family: -apple-system, BlinkMacSystemFont, sans-serif; line-height: 1.6; transition: background-color 0.3s ease, color 0.3s ease; }

  /* NAV */
  nav { background: var(--card); border-bottom: 1px solid var(--border); padding: 1rem 1.5rem; display: flex; justify-content: space-between; align-items: center; margin-bottom: 2rem; transition: background-color 0.3s ease, border-color 0.3s ease;}
  .nav-brand { font-weight: 800; font-size: 1.15rem; color: var(--text); text-decoration: none; }
  .nav-brand span { color: var(--orange); }

  .container { max-width: 850px; margin: 0 auto; padding: 0 1rem 3rem; }
  .card { background: var(--card); border: 1px solid var(--border); border-radius: 12px; padding: 2rem; box-shadow: 0 10px 30px rgba(0,0,0,0.8); margin-bottom: 25px; transition: background-color 0.3s ease, border-color 0.3s ease; }
  [data-theme="light"] .card { box-shadow: 0 10px 30px rgba(0,0,0,0.1); }

  h1 { text-align: center; color: var(--text); text-transform: uppercase; letter-spacing: 2px; font-size: 1.5rem; margin-bottom: 5px;}
  .subtitle { text-align: center; color: var(--muted); font-size: 0.9rem; margin-bottom: 1.5rem; }

  .warning { background: rgba(207,102,121,0.08); border: 1px dashed var(--red); border-radius: 6px; padding: 12px; font-size: 0.85rem; color: var(--red); text-align: center; margin-bottom: 2rem; }

  /* Form Elements */
  .controls { display: flex; gap: 15px; flex-wrap: wrap; background: var(--card2); padding: 15px; border-radius: 8px; border: 1px solid var(--border); margin-bottom: 20px; transition: background-color 0.3s ease, border-color 0.3s ease;}
  .control-group { flex: 1; min-width: 200px; display: flex; flex-direction: column; gap: 5px; }
  .control-group label { font-size: 0.85rem; font-weight: bold; color: var(--muted); text-transform: uppercase; letter-spacing: 1px;}
  select, input { background: var(--bg); color: var(--text); border: 1px solid var(--border); padding: 10px; border-radius: 6px; font-size: 1rem; width: 100%; transition: background-color 0.3s ease, color 0.3s ease, border-color 0.3s ease;}
  select:focus, input:focus { outline: none; border-color: var(--teal); }

  /* Grid Seed Inputs */
  .seed-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 10px; margin-bottom: 10px; }
  @media (max-width: 600px) { .seed-grid { grid-template-columns: repeat(3, 1fr); } }
  @media (max-width: 450px) { .seed-grid { grid-template-columns: repeat(2, 1fr); } }

  .word-box {
      display: flex; align-items: center;
      background: var(--input-bg); border: 1px solid var(--border);
      border-radius: 4px; padding: 6px 8px; transition: border-color 0.3s, background-color 0.3s ease;
      position: relative; /* REQUIRED FOR AUTOCOMPLETE POSITIONING */
  }
  .word-box:focus-within { border-color: var(--orange); }
  .word-box.invalid { border-color: var(--red); box-shadow: 0 0 5px rgba(207, 102, 121, 0.4); }
  .word-box span { color: var(--muted); font-size: 0.8em; width: 22px; user-select: none; }
  .word-box input {
      width: 100%; background: transparent; border: none;
      color: var(--orange); font-family: var(--mono);
      font-size: 15px; outline: none; padding: 0; margin: 0;
  }

  /* --- Autocomplete Dropdown Styles --- */
  .autocomplete-list {
      position: absolute;
      top: 100%;
      left: 0;
      right: 0;
      background: var(--card2);
      border: 1px solid var(--border);
      border-radius: 4px;
      max-height: 150px;
      overflow-y: auto;
      z-index: 1000;
      display: none; 
      box-shadow: 0 8px 16px rgba(0,0,0,0.5);
  }

  [data-theme="light"] .autocomplete-list { box-shadow: 0 8px 16px rgba(0,0,0,0.1); }

  .autocomplete-item {
      padding: 8px 10px;
      cursor: pointer;
      font-family: var(--mono);
      font-size: 14px;
      color: var(--text);
      border-bottom: 1px solid var(--border);
      transition: background-color 0.2s;
  }

  .autocomplete-item:last-child { border-bottom: none; }
  .autocomplete-item:hover, .autocomplete-item.active-suggestion {
      background: var(--teal);
      color: #000;
      font-weight: bold;
  }

  /* --- Scanner Styles --- */
  .scanner-container {
      display: none;
      margin-top: 15px;
      padding: 15px;
      background: #000;
      border-radius: 8px;
      border: 1px solid var(--border);
      text-align: center;
  }
  .scanner-container > div { width: 100%; max-width: 400px; margin: 0 auto; border-radius: 8px; overflow: hidden; }
  .scan-progress { margin-top: 10px; font-weight: bold; color: var(--teal); }

  .seed-input-block { padding-bottom: 20px; margin-bottom: 20px; border-bottom: 1px dashed var(--border); }
  .seed-input-block:last-child { border-bottom: none; margin-bottom: 0; padding-bottom: 0; }
  
  .radio-group { display: flex; gap: 15px; }
  .radio-group label { cursor: pointer; display: flex; align-items: center; gap: 5px; color: var(--text); text-transform: none; font-weight: normal; }

  .btn { display: block; width: 100%; padding: 15px; font-size: 1.1rem; background: var(--orange); color: #111; border: none; border-radius: 8px; cursor: pointer; font-weight: 800; text-transform: uppercase; letter-spacing: 1px; transition: all 0.3s;}
  .btn:hover { background: var(--orange); opacity: 0.8; transform: translateY(-2px); box-shadow: 0 6px 20px rgba(247,147,26,0.3); }

  /* Output Area */
  .result-box { margin-top: 2rem; border: 1px solid var(--teal); border-radius: 8px; padding: 20px; background: rgba(3,218,198,0.03); }
  .result-box h3 { color: var(--teal); margin-bottom: 15px; border-bottom: 1px solid rgba(3,218,198,0.2); padding-bottom: 10px;}
  
  .descriptor-output { background: #111; font-family: var(--mono); font-size: 1rem; color: #fff; padding: 15px; border-radius: 6px; border: 1px solid var(--border); word-break: break-all; margin-bottom: 15px; min-height: 80px; overflow-x: auto; }
  [data-theme="light"] .descriptor-output { background: #e0e0e0; color: #121212; }
  
  .action-buttons { display: flex; gap: 10px; flex-wrap: wrap; margin-bottom: 15px; justify-content: flex-start; }
  .copy-btn { padding: 8px 16px; font-size: 0.85rem; background: transparent; color: var(--teal); border: 1px solid var(--teal); border-radius: 4px; cursor: pointer; transition: all 0.2s; font-weight: bold; text-transform: uppercase; }
  .copy-btn:hover { background: var(--teal); color: #121212; }

  .qr-container { background: #ffffff; padding: 15px; border-radius: 8px; width: max-content; border: 3px solid var(--border); margin: 0 auto 20px; display: flex; flex-direction: column; align-items: center;}
  .qr-placeholder { width: 500px; height: 500px; border: 2px dashed #ccc; display: flex; align-items: center; justify-content: center; color: #666; font-weight: bold; }

  /* Print Styles */
  @media print {
    body { background: white; color: black; margin: 0; padding: 0; }
    nav, .card:not(.result-box), .warning, .action-buttons { display: none !important; }
    .card.result-box { box-shadow: none; border: none; margin: 0; padding: 0; background: transparent; }
    
    .descriptor-output { 
        border: 1px solid #ccc; 
        color: black; 
        background: white; 
        page-break-inside: avoid;
        break-inside: avoid;
    }
    
    .qr-container { 
        border: none; 
        padding: 0; 
        margin-top: 0; 
        page-break-inside: avoid;
        break-inside: avoid;
    }

    #last-words-output {
        page-break-inside: avoid;
        break-inside: avoid;
    }

    h3, label, th, td { color: black !important; }
  }
</style>

<nav>
  <a href="../index.html" class="nav-brand">SafeKeep<span>Bitcoin</span></a>
  <button onclick="toggleTheme()" id="theme-btn" style="background:transparent; border:none; color:var(--text); font-size:1.2rem; cursor:pointer;">
    ☀️
  </button>
</nav>

<div class="container">
    <h1>Output Descriptor Generator</h1>
    <div class="subtitle">Construct Watch-Only Wallets from Air-Gapped Entropy</div>

    

    <div class="card">
        <h3 style="margin-bottom: 15px; border-bottom: 1px solid var(--border); padding-bottom: 10px;">1. Wallet Configuration</h3>
        
        <div class="controls">
            <div class="control-group">
                <label>Wallet Architecture</label>
                <select id="wallet-type" onchange="updateUIState()">
                    <option value="single">Single Signature</option>
                    <option value="multi">Multi-Signature</option>
                </select>
            </div>
            <div class="control-group">
                <label>Script Type</label>
                <select id="script-type" onchange="updateUIState()">
                    <option value="84">Native SegWit (BIP84 / bc1q)</option>
                    <option value="86">Taproot (BIP86 / bc1p)</option>
                    <option value="49">Nested SegWit (BIP49 / 3...)</option>
                    <option value="44">Legacy (BIP44 / 1...)</option>
                </select>
            </div>
        </div>

        <div id="multisig-config" class="controls hidden" style="border-color: var(--teal); background: rgba(3, 218, 198, 0.05);">
            <div class="control-group">
                <label style="color: var(--teal);">Signatures Required (m)</label>
                <select id="m-required">
                    <option value="1">1</option>
                    <option value="2" selected>2</option>
                    <option value="3">3</option>
                    <option value="4">4</option>
                    <option value="5">5</option>
                </select>
            </div>
            <div class="control-group">
                <label style="color: var(--teal);">Total Cosigners (n)</label>
                <select id="n-total" onchange="updateUIState()">
                    <option value="2">2</option>
                    <option value="3" selected>3</option>
                    <option value="4">4</option>
                    <option value="5">5</option>
                    <option value="6">6</option>
                    <option value="7">7</option>
                </select>
            </div>
        </div>
        
        <div class="control-group" style="padding: 0 15px;">
            <label>Derivation Path</label>
            <input type="text" id="derivation-path" value="m/84'/0'/0'" style="font-family: var(--mono);" readonly>
            <small style="color: var(--muted);">Auto-calculated based on script type (Mainnet).</small>
        </div>
    </div>

    <div class="card">
        <h3 style="margin-bottom: 15px; border-bottom: 1px solid var(--border); padding-bottom: 10px;">2. Entropy Input</h3>
        
        <div class="control-group" style="margin-bottom: 20px;">
            <label>Seed Phrase Length</label>
            <div class="radio-group">
                <label><input type="radio" name="seedLength" value="12" checked onchange="updateUIState()"> 12 Words</label>
                <label><input type="radio" name="seedLength" value="24" onchange="updateUIState()"> 24 Words</label>
            </div>
        </div>

        <div id="seed-inputs-container" class="controls" style="flex-direction: column; background: transparent; padding: 0; border: none;"></div>
        <button class="btn" id="btn-generate">Generate Descriptor</button>
    </div>

    <div class="card result-box" id="result-box" style="display: none;">
        <h3>3. Air-Gapped Export</h3>
        
        <div class="action-buttons" style="justify-content: center;">
            <button class="copy-btn" id="btn-copy">📋 Copy Descriptor</button>
            <button class="copy-btn" id="btn-download">💾 Download Descriptor (.txt)</button>
            <button class="copy-btn" id="btn-print" onclick="window.print()">🖨️ Print Backup</button>
            <button class="copy-btn" id="btn-planner" style="border-color: var(--orange); color: var(--orange);" onclick="exportToPlanner()">🏗️ Export to Architecture Planner</button>
        </div>
        
        <div class="qr-container">
            <div class="qr-placeholder" id="qr-target">[ QR Renders Here ]</div>
        </div>

        <div id="last-words-output" style="display: none; background: rgba(3, 218, 198, 0.05); padding: 15px; border-radius: 6px; border: 1px solid var(--border); margin-bottom: 20px;">
            <label style="font-size: 0.85rem; font-weight: bold; color: var(--teal); text-transform: uppercase; margin-bottom: 10px; display: block;">Backup Reference</label>
        </div>

        <label style="font-size: 0.85rem; font-weight: bold; color: var(--muted); text-transform: uppercase; margin-bottom: 5px; display: block;">Raw Output Descriptor</label>
        <div class="descriptor-output" id="descriptor-text"></div>

        <label style="font-size: 0.85rem; font-weight: bold; color: var(--muted); text-transform: uppercase; margin-top: 25px; margin-bottom: 5px; display: block;">Address Verification</label>
        <div class="descriptor-output" id="address-output" style="padding: 15px;"></div>
    </div>

</div>

// --- AUTOCOMPLETE & VALIDATION HELPER FUNCTIONS ---
function closeAllLists(elmnt) {
    const x = document.querySelectorAll('.autocomplete-list');
    const inputs = document.querySelectorAll('.word-input');
    for (let i = 0; i < x.length; i++) {
        if (elmnt !== x[i] && elmnt !== inputs) {
            x[i].parentNode.removeChild(x[i]);
        }
    }
}

document.addEventListener("click", function (e) {
    closeAllLists(e.target);
});

window.validateWord = function(input) {
    const val = input.value.trim().toLowerCase();
    const wordBox = input.closest('.word-box');
    
    if (val === '') {
        wordBox.classList.remove('invalid');
        return false;
    }
    
    if (WORDLIST && WORDLIST.length > 0 && !WORDLIST.includes(val)) {
        wordBox.classList.add('invalid');
        return false;
    } else {
        wordBox.classList.remove('invalid');
        return true;
    }
};

function attachAutocompleteEvents() {
    // Clean up old listeners by cloning
    const allInputs = document.querySelectorAll('.word-input');
    allInputs.forEach(input => {
        const clone = input.cloneNode(true);
        input.parentNode.replaceChild(clone, input);
    });

    const refreshedInputs = document.querySelectorAll('.word-input');
    refreshedInputs.forEach((input, index) => {
        
        // 1. TYPING & AUTOCOMPLETE FILTERING
        input.addEventListener('input', function() {
            let val = this.value.toLowerCase();
            closeAllLists();
            window.validateWord(this);

            if (!val || !WORDLIST || WORDLIST.length === 0) return false;

            let list = document.createElement("DIV");
            list.setAttribute("class", "autocomplete-list");
            list.style.display = "block";
            this.parentNode.appendChild(list);

            let matches = 0;
            for (let i = 0; i < WORDLIST.length; i++) {
                if (WORDLIST[i].substr(0, val.length) === val) {
                    let item = document.createElement("DIV");
                    item.setAttribute("class", "autocomplete-item");
                    item.innerHTML = "<strong>" + WORDLIST[i].substr(0, val.length) + "</strong>";
                    item.innerHTML += WORDLIST[i].substr(val.length);
                    item.innerHTML += "<input type='hidden' value='" + WORDLIST[i] + "'>";
                    
                    item.addEventListener("click", function(e) {
                        input.value = this.getElementsByTagName("input")[0].value;
                        window.validateWord(input);
                        closeAllLists();
                        // Focus next input in the SAME quorum block
                        const nextInput = refreshedInputs[index + 1];
                        if (nextInput && nextInput.closest('.seed-grid') === input.closest('.seed-grid')) {
                            nextInput.focus();
                        }
                    });
                    
                    list.appendChild(item);
                    matches++;
                }
            }
            if (matches > 0) list.firstChild.classList.add('active-suggestion');
        });

        // 2. THE TAB KEY LOGIC
        input.addEventListener('keydown', function(e) {
            let list = this.parentNode.querySelector('.autocomplete-list');
            if (list && list.style.display === 'block' && e.key === 'Tab') {
                e.preventDefault(); 
                const firstItem = list.firstChild;
                if (firstItem) {
                    this.value = firstItem.getElementsByTagName("input")[0].value; 
                    window.validateWord(this);
                    closeAllLists();
                    // Focus next input in the SAME quorum block
                    const nextInput = refreshedInputs[index + 1];
                    if (nextInput && nextInput.closest('.seed-grid') === input.closest('.seed-grid')) {
                        nextInput.focus();
                    }
                }
            }
        });

        // 3. SMART PASTING
        input.addEventListener('paste', function(e) {
            e.preventDefault();
            const pasteData = (e.clipboardData || window.clipboardData).getData('text');
            const words = pasteData.trim().split(/[\s\n]+/); 
            
            const blockIndex = parseInt(this.closest('.seed-grid').className.match(/seed-grid-(\d+)/)[1]);

            // Auto-adjust global 12/24 words if needed
            const global12 = document.querySelector('input[name="seedLength"][value="12"]');
            const global24 = document.querySelector('input[name="seedLength"][value="24"]');
            
            if (words.length === 24 && global12.checked) {
                global24.checked = true;
                updateUIState();
                setTimeout(() => fillPastedWords(words, blockIndex, 0), 10);
                return;
            } else if (words.length === 12 && global24.checked) {
                global12.checked = true;
                updateUIState();
                setTimeout(() => fillPastedWords(words, blockIndex, 0), 10);
                return;
            }

            // Find specific index within this specific block
            const blockInputs = document.querySelectorAll(`.seed-grid-${blockIndex} .word-input`);
            let localIndex = Array.from(blockInputs).indexOf(this);
            
            fillPastedWords(words, blockIndex, localIndex);
        });
    });
}

function fillPastedWords(words, blockIndex, startIndex) {
    const inputs = document.querySelectorAll(`.seed-grid-${blockIndex} .word-input`);
    words.forEach((word, i) => {
        if (startIndex + i < inputs.length) {
            const targetInput = inputs[startIndex + i];
            targetInput.value = word.toLowerCase();
            window.validateWord(targetInput);
        }
    });
    const nextIndex = Math.min(startIndex + words.length, inputs.length - 1);
    if (inputs[nextIndex]) inputs[nextIndex].focus();
    closeAllLists();
}

// --- PER-QUORUM QR SCANNER LOGIC ---
let activeHtml5QrCode = null;
let activeScannerIndex = null;

window.toggleScanner = function(index) {
    const container = document.getElementById(`scanner-container-${index}`);
    
    // If clicking cancel on the currently active scanner
    if (activeScannerIndex === index && activeHtml5QrCode) {
        activeHtml5QrCode.stop().then(() => {
            activeHtml5QrCode.clear();
            activeHtml5QrCode = null;
            container.style.display = 'none';
            activeScannerIndex = null;
        }).catch(console.error);
        return;
    }

    // If another scanner is open, stop it first
    if (activeHtml5QrCode) {
        activeHtml5QrCode.stop().then(() => {
            activeHtml5QrCode.clear();
            document.getElementById(`scanner-container-${activeScannerIndex}`).style.display = 'none';
            startScannerForBlock(index, container);
        }).catch(console.error);
    } else {
        startScannerForBlock(index, container);
    }
}

function startScannerForBlock(index, container) {
    if (!window.Html5Qrcode) {
        alert("Scanner library not loaded. Check your Vite build.");
        return;
    }
    
    container.style.display = 'block';
    activeScannerIndex = index;
    activeHtml5QrCode = new window.Html5Qrcode(`reader-${index}`);
    
    activeHtml5QrCode.start(
        { facingMode: "environment" },
        { fps: 10, qrbox: { width: 250, height: 250 } },
        (decodedText) => {
            // Success
            window.toggleScanner(index); // Turn off camera
            const words = decodedText.trim().split(/[\s\n]+/);
            
            const global12 = document.querySelector('input[name="seedLength"][value="12"]');
            const global24 = document.querySelector('input[name="seedLength"][value="24"]');
            
            if (words.length === 24 && global12.checked) {
                global24.checked = true;
                updateUIState();
                setTimeout(() => fillPastedWords(words, index, 0), 50);
            } else if (words.length === 12 && global24.checked) {
                global12.checked = true;
                updateUIState();
                setTimeout(() => fillPastedWords(words, index, 0), 50);
            } else {
                fillPastedWords(words, index, 0);
            }
        },
        (error) => { /* ignore frame errors */ }
    ).catch(err => {
        alert(`Camera access failed: ${err.message}`);
        container.style.display = 'none';
        activeScannerIndex = null;
    });
}


// --- CORE UI LOGIC ---
function updateUIState() {
    const walletType = document.getElementById('wallet-type').value;
    const scriptType = document.getElementById('script-type').value;
    const multisigConfig = document.getElementById('multisig-config');
    const seedContainer = document.getElementById('seed-inputs-container');
    const seedLength = parseInt(document.querySelector('input[name="seedLength"]:checked').value);
    
    const isMulti = walletType === 'multi';
    
    // Hardcode Network to Mainnet (coinType 0')
    const coinType = "0'"; 
    
    let derivationPath = "";
    if (isMulti) {
        let scriptIndicator = "2'"; 
        if (scriptType === '86') scriptIndicator = "3'";
        else if (scriptType === '49') scriptIndicator = "1'";
        else if (scriptType === '44') scriptIndicator = "0'"; 
        derivationPath = `m/48'/${coinType}/0'/${scriptIndicator}`;
    } else {
        derivationPath = `m/${scriptType}'/${coinType}/0'`;
    }
    
    document.getElementById('derivation-path').value = derivationPath;

    if (isMulti) {
        multisigConfig.classList.remove('hidden');
    } else {
        multisigConfig.classList.add('hidden');
    }

    const nTotal = isMulti ? parseInt(document.getElementById('n-total').value) : 1;
    
    let html = '';
    for (let i = 0; i < nTotal; i++) {
        const label = isMulti ? `Cosigner ${i+1} Seed Phrase` : `BIP39 Seed Phrase`;
        
        let gridHtml = `<div class="seed-grid seed-grid-${i}">`;
        for (let w = 0; w < seedLength; w++) {
            gridHtml += `
                <div class="word-box">
                    <span>${w+1}.</span>
                    <input type="text" class="word-input" autocomplete="off">
                </div>
            `;
        }
        gridHtml += `</div>`;

        html += `
            <div class="controls" style="flex-direction: column; margin-bottom: 20px;">
                <label style="font-size: 0.85rem; font-weight: bold; color: var(--muted); text-transform: uppercase;">${label}</label>
                ${gridHtml}
                <input type="text" id="passphrase-${i}" placeholder="Optional Passphrase (leave blank if none)" style="margin-top: 5px; margin-bottom: 10px;">
                
                <div class="action-buttons" style="margin-bottom: 0;">
                    <button class="copy-btn" style="flex: 1; border-color: var(--teal); color: var(--teal);" onclick="toggleScanner(${i})">📷 Scan from QR</button>
                    <button class="copy-btn" style="flex: 1; border-color: var(--orange); color: var(--orange);" onclick="exportToNote(${i})">🔐 Export to Note</button>
                </div>
                
                <div id="scanner-container-${i}" class="scanner-container">
                    <div id="reader-${i}"></div>
                    <div class="scan-progress">Awaiting Seed Phrase QR Code...</div>
                    <button class="btn" style="background: var(--red); color: white; margin-top: 10px;" onclick="toggleScanner(${i})">Cancel Scan</button>
                </div>
            </div>
        `;
    }
    seedContainer.innerHTML = html;
    
    // Attach the autocomplete and smart paste listeners to the newly rendered DOM elements
    attachAutocompleteEvents();
    
    if (isMulti) {
        const mSelect = document.getElementById('m-required');
        const mVal = parseInt(mSelect.value);
        if (mVal > nTotal) mSelect.value = nTotal;
        Array.from(mSelect.options).forEach(opt => {
            opt.disabled = parseInt(opt.value) > nTotal;
        });
    }

    // Hide results if regenerating
    document.getElementById('result-box').style.display = 'none';
}

window.onload = () => {
    updateUIState();
};

function descriptorChecksum(desc) {
    const INPUT_CHARSET = "0123456789()[],'/*abcdefgh@:$%{}IJKLMNOPQRSTUVWXYZ&+-.;<=>?!^_|~ijklmnopqrstuvwxyzABCDEFGH`#\"\\ ";
    const CHECKSUM_CHARSET = "qpzry9x8gf2tvdw0s3jn54khce6mua7l";
    const GENERATOR = [0xf5dee51989n, 0xa9fdca3312n, 0x1bab10e32dn, 0x3706b1677an, 0x644d626ffdn];

    function polymod(c, val) {
        let c0 = c >> 35n;
        c = ((c & 0x7ffffffffn) << 5n) ^ BigInt(val);
        if (c0 & 1n) c ^= GENERATOR[0];
        if (c0 & 2n) c ^= GENERATOR[1];
        if (c0 & 4n) c ^= GENERATOR[2];
        if (c0 & 8n) c ^= GENERATOR[3];
        if (c0 & 16n) c ^= GENERATOR[4];
        return c;
    }

    let c = 1n;
    let cls = 0;
    let clscount = 0;
    for (let ch of desc) {
        let pos = INPUT_CHARSET.indexOf(ch);
        if (pos === -1) return "";
        c = polymod(c, pos & 31);
        cls = cls * 3 + (pos >> 5);
        clscount++;
        if (clscount === 3) {
            c = polymod(c, cls);
            cls = 0;
            clscount = 0;
        }
    }
    if (clscount > 0) c = polymod(c, cls);
    for (let j = 0; j < 8; j++) c = polymod(c, 0);
    c ^= 1n;

    let ret = "";
    for (let j = 0; j < 8; j++) {
        ret += CHECKSUM_CHARSET[Number((c >> (5n * BigInt(7 - j))) & 31n)];
    }
    return ret;
}

const SLIP132 = {
    mainnet: {
        '84': { public: 0x04b24746 }, 
        '86': { public: 0x0488b21e }, 
        '49': { public: 0x049d7cb2 }, 
        '44': { public: 0x0488b21e }, 
        '48_2': { public: 0x02aa7ed3 }, 
        '48_1': { public: 0x0295b43f }  
    }
};

let currentWalletData = null; 

async function generateDescriptor() {
    const btn = document.getElementById('btn-generate');
    const resultBox = document.getElementById('result-box');
    const outputText = document.getElementById('descriptor-text');
    const addressOutput = document.getElementById('address-output');
    const lastWordsOutput = document.getElementById('last-words-output');
    
    if (!window.BtcMath || !window.QRCode) {
        resultBox.style.display = 'block';
        outputText.innerHTML = '<span style="color:var(--danger)">Error: Cryptography library not loaded. Ensure your descriptor.js is compiling correctly.</span>';
        return;
    }
    
    btn.disabled = true;
    btn.innerText = "Processing...";
    resultBox.style.display = 'block';
    
    try {
        const { bip39, HDKey, btc } = window.BtcMath;
        
        const walletType = document.getElementById('wallet-type').value;
        const scriptType = document.getElementById('script-type').value;
        const isMulti = walletType === 'multi';
        const mReq = isMulti ? parseInt(document.getElementById('m-required').value) : 1;
        const derivationPath = document.getElementById('derivation-path').value;
        const networkObj = btc.NETWORK; 
        
        const networkBytes = SLIP132['mainnet']['44'];
        const nTotal = isMulti ? parseInt(document.getElementById('n-total').value) : 1;
        const keyOrigins = [];
        const keystores = [];
        const accountNodes = []; 
        let lastWordsHtml = "<ul style='margin-left: 20px; padding-left: 0; list-style-type: none;'>";

        for (let i = 0; i < nTotal; i++) {
            const wordInputs = document.querySelectorAll(`.seed-grid-${i} input.word-input`);
            const words = [];
            wordInputs.forEach(inp => words.push(inp.value.trim().toLowerCase()));
            
            if (words.some(w => w === '')) throw new Error(`Seed phrase ${i+1} is incomplete.`);
            
            const passphrase = document.getElementById(`passphrase-${i}`).value.trim();
            const passDisplay = passphrase ? `<span style='font-family: var(--mono); color: var(--teal);'>${passphrase}</span>` : `<span style='color: var(--muted);'>None</span>`;
            
            const lastWord = words[words.length - 1];
            lastWordsHtml += `
                <li style='margin-bottom: 12px; border-left: 2px solid var(--teal); padding-left: 10px;'>
                    <div style='margin-bottom: 4px;'>
                        <strong style='color: var(--text);'>Seed Phrase ${i+1} Last Word:</strong> 
                        <span style='font-family: var(--mono); color: var(--orange);'>${lastWord}</span>
                    </div>
                    <div>
                        <strong style='color: var(--text);'>Passphrase:</strong> 
                        ${passDisplay}
                    </div>
                </li>
            `;
            
            const seedMnemonic = words.join(' ');
            const cryptoPassphrase = document.getElementById(`passphrase-${i}`).value;
            const seedBytes = await bip39.mnemonicToSeed(seedMnemonic, cryptoPassphrase);
            
            const rootNode = HDKey.fromMasterSeed(seedBytes, { public: 0x0488b21e, private: 0x0488ade4 });
            const fingerprint = rootNode.fingerprint.toString(16).padStart(8, '0');
            
            const accountNode = rootNode.derive(derivationPath);
            accountNode.versions = networkBytes; 
            const extPubKey = accountNode.publicExtendedKey;
            
            accountNodes.push(accountNode);

            const cleanPath = derivationPath.replace('m/', '');
            keyOrigins.push(`[${fingerprint}/${cleanPath}]${extPubKey}`);
            
            keystores.push({
                type: "readonly",
                source: "bip39",
                derivation: derivationPath,
                masterFingerprint: fingerprint.toUpperCase(),
                xpub: extPubKey
            });
        }
        lastWordsHtml += "</ul>";
        
        lastWordsOutput.innerHTML = `<label style="font-size: 0.85rem; font-weight: bold; color: var(--teal); text-transform: uppercase; margin-bottom: 10px; display: block;">Backup Reference</label>${lastWordsHtml}`;
        lastWordsOutput.style.display = 'block';

        let descriptorBody = "";
        let policyType = isMulti ? "multi" : "single";
        let jsonScriptType = "";

        if (isMulti) {
            const keysStr = keyOrigins.map(k => `${k}/<0;1>/*`).join(',');
            descriptorBody = `sortedmulti(${mReq},${keysStr})`; 
            
            if (scriptType === '84') {
                descriptorBody = `wsh(${descriptorBody})`;
                jsonScriptType = "p2wsh";
            } else if (scriptType === '86') {
                descriptorBody = `tr(${keyOrigins[0]}/<0;1>/*,${descriptorBody})`; 
                jsonScriptType = "p2tr";
            } else if (scriptType === '49') {
                descriptorBody = `sh(wsh(${descriptorBody}))`;
                jsonScriptType = "p2sh-p2wsh";
            }
        } else {
            const keyStr = `${keyOrigins[0]}/<0;1>/*`;
            if (scriptType === '84') {
                descriptorBody = `wpkh(${keyStr})`;
                jsonScriptType = "p2wpkh";
            } else if (scriptType === '86') {
                descriptorBody = `tr(${keyStr})`;
                jsonScriptType = "p2tr";
            } else if (scriptType === '49') {
                descriptorBody = `sh(wpkh(${keyStr}))`;
                jsonScriptType = "p2sh-p2wpkh";
            } else if (scriptType === '44') {
                descriptorBody = `pkh(${keyStr})`;
                jsonScriptType = "p2pkh";
            }
        }

        const checksum = descriptorChecksum(descriptorBody);
        const finalDescriptor = `${descriptorBody}#${checksum}`;
        
        outputText.innerText = finalDescriptor;
        outputText.style.color = "var(--success)";

        const qrContainer = document.getElementById('qr-target');
        qrContainer.innerHTML = '<canvas></canvas>';
        qrContainer.style.border = 'none';
        
        window.QRCode.toCanvas(qrContainer.querySelector('canvas'), finalDescriptor, {
            width: 500,
            errorCorrectionLevel: 'L',
            color: {
                dark: '#000000',
                light: '#ffffff'
            }
        });

        currentWalletData = {
            name: isMulti ? `SafeKeep_${mReq}of${nTotal}` : `SafeKeep_Single`,
            policyType: policyType,
            scriptType: jsonScriptType,
            quorum: isMulti ? mReq : 1,
            keystores: keystores
        };

        // Generate Addresses
        let addressHTML = "<table class='addr-table' style='width: 100%; border-collapse: collapse;'>";
        addressHTML += "<tr style='text-align: left;'><th style='padding: 8px; border-bottom: 1px solid var(--border);'>Derivation Path</th><th style='padding: 8px; border-bottom: 1px solid var(--border);'>Receive Address</th></tr>";

        for (let i = 0; i < 5; i++) {
            try {
                let address = "";
                let childPubkeys = [];
                
                for (let j = 0; j < accountNodes.length; j++) {
                    const childNode = accountNodes[j].deriveChild(0).deriveChild(i);
                    childPubkeys.push(childNode.publicKey);
                }

                if (isMulti) {
                    childPubkeys.sort((a, b) => {
                        for (let k = 0; k < Math.min(a.length, b.length); k++) {
                            if (a[k] !== b[k]) return a[k] - b[k];
                        }
                        return a.length - b.length;
                    });

                    if (scriptType === '84') {
                        const ms = btc.p2ms(mReq, childPubkeys);
                        address = btc.p2wsh(ms, networkObj).address;
                    } else if (scriptType === '49') {
                        const ms = btc.p2ms(mReq, childPubkeys);
                        const wsh = btc.p2wsh(ms);
                        address = btc.p2sh(wsh, networkObj).address;
                    } else if (scriptType === '44') {
                        const ms = btc.p2ms(mReq, childPubkeys);
                        address = btc.p2sh(ms, networkObj).address;
                    } else if (scriptType === '86') {
                        if (btc.p2tr_ms) {
                            const tr_ms = btc.p2tr_ms(mReq, childPubkeys);
                            const internalPubKey = accountNodes[0].deriveChild(0).deriveChild(i).publicKey.slice(1, 33);
                            address = btc.p2tr(internalPubKey, tr_ms, networkObj).address;
                        } else {
                            address = "Taproot Multisig preview unavailable";
                        }
                    }
                } else {
                    const pubkey = childPubkeys[0];
                    if (scriptType === '84') {
                        address = btc.p2wpkh(pubkey, networkObj).address;
                    } else if (scriptType === '86') {
                        const xOnlyPub = pubkey.slice(1, 33);
                        address = btc.p2tr(xOnlyPub, undefined, networkObj).address;
                    } else if (scriptType === '49') {
                        const inner = btc.p2wpkh(pubkey);
                        address = btc.p2sh(inner, networkObj).address;
                    } else if (scriptType === '44') {
                        address = btc.p2pkh(pubkey, networkObj).address;
                    }
                }
                
                addressHTML += `<tr><td style='color: var(--muted); padding: 8px; border-bottom: 1px solid var(--border);'>m/0/${i}</td><td style='padding: 8px; border-bottom: 1px solid var(--border);'>${address}</td></tr>`;
            } catch (addrErr) {
                console.error(addrErr);
                addressHTML += `<tr><td style='color: var(--muted); padding: 8px; border-bottom: 1px solid var(--border);'>m/0/${i}</td><td style='color: var(--red); padding: 8px; border-bottom: 1px solid var(--border);'>Preview unavailable for this format</td></tr>`;
            }
        }
        addressHTML += "</table>";
        addressOutput.innerHTML = addressHTML;

    } catch (err) {
        outputText.innerHTML = `<span style="color:var(--danger)">Error: ${err.message}</span>`;
        addressOutput.innerHTML = `<span style="color:var(--danger)">Fix errors above to see addresses.</span>`;
        lastWordsOutput.style.display = 'none';
    } finally {
        btn.disabled = false;
        btn.innerText = "Generate Descriptor";
    }
}

function downloadDescriptor() {
    const rawDesc = document.getElementById('descriptor-text').innerText;
    
    if (!rawDesc || rawDesc === "Awaiting input..." || rawDesc.includes("Error") || rawDesc === "") {
        alert("Please generate a valid descriptor first.");
        return;
    }
    
    const dataStr = "data:text/plain;charset=utf-8," + encodeURIComponent(rawDesc);
    const downloadAnchorNode = document.createElement('a');
    downloadAnchorNode.setAttribute("href", dataStr);
    
    const walletName = currentWalletData ? currentWalletData.name : "SafeKeep_Wallet";
    downloadAnchorNode.setAttribute("download", walletName + "_Descriptor.txt");
    
    document.body.appendChild(downloadAnchorNode); 
    downloadAnchorNode.click();
    downloadAnchorNode.remove();
}

function copyDescriptor() {
    const text = document.getElementById('descriptor-text').innerText;
    if (text === "Awaiting input..." || text.includes("Error") || text === "") return;
    
    navigator.clipboard.writeText(text).then(() => {
        const btn = document.getElementById('btn-copy');
        const orig = btn.innerText;
        btn.innerText = '📋 COPIED!';
        setTimeout(() => btn.innerText = orig, 1800);
    });
}

function exportToNote(seedIndex) {
    const walletType = document.getElementById('wallet-type').options[document.getElementById('wallet-type').selectedIndex].text;
    const scriptType = document.getElementById('script-type').options[document.getElementById('script-type').selectedIndex].text;
    const isMulti = document.getElementById('wallet-type').value === 'multi';
    const mReq = isMulti ? document.getElementById('m-required').value : 1;
    const nTotal = isMulti ? document.getElementById('n-total').value : 1;
    const mOfN = isMulti ? `${mReq} of ${nTotal}` : `1 of 1`;
    const derivationPath = document.getElementById('derivation-path').value;
    
    const words = [];
    const inputs = document.querySelectorAll(`.seed-grid-${seedIndex} input[type="text"].word-input`);
    inputs.forEach(inp => words.push(inp.value.trim()));
    
    if (words.some(w => w === '')) {
        alert("Please fill in the entire seed phrase before exporting.");
        return;
    }
    
    const pass = document.getElementById(`passphrase-${seedIndex}`).value;
    
    const noteHtml = `
        <h2>Wallet Configuration</h2>
        <ul>
            <li><strong>Architecture:</strong> ${walletType}</li>
            <li><strong>Script Type:</strong> ${scriptType}</li>
            <li><strong>Quorum:</strong> ${mOfN}</li>
            <li><strong>Derivation Path:</strong> ${derivationPath}</li>
            <li><strong>Key Share:</strong> ${seedIndex + 1} of ${nTotal}</li>
        </ul>
        <h3>Entropy Details</h3>
        <p><strong>Seed:</strong> ${words.join(' ')}</p>
        <p><strong>Passphrase:</strong> ${pass || 'None'}</p>
        <p><em>Keep this note secure. It contains cryptographic secrets.</em></p>
    `;
    
    const payload = {
        safekeep_version: "1.0",
        type: "seed_export",
        seed: words.join(' '),
        passphrase: pass,
        path: derivationPath
    };
    
    const b64Payload = btoa(JSON.stringify(payload));
    const payloadHtml = `
        <hr style="margin-top: 30px; border: 0; border-top: 1px solid var(--border);">
        <p style="font-family: var(--mono); font-size: 0.75em; color: var(--muted); word-break: break-all;">
            <strong>⚙️ AUTO-FILL PAYLOAD (DO NOT EDIT):</strong><br>
            [SKB_PAYLOAD:${b64Payload}]
        </p>
    `;

    const combinedData = noteHtml + payloadHtml;

    sessionStorage.setItem('safeKeepDraftNote', combinedData);
    localStorage.setItem('safeKeepDraftNote', combinedData);
    
    const plainText = noteHtml.replace(/<[^>]+>/g, '\n').replace(/\n\s*\n/g, '\n');
    navigator.clipboard.writeText(plainText).then(() => {
        alert(`Seed Phrase ${seedIndex + 1} data copied to clipboard!\n\nOpening Encrypted Note Tool...`);
        window.open('../secure-note/index.html', '_blank');
    }).catch(err => {
        window.open('../secure-note/index.html', '_blank');
    });
}

function exportToPlanner() {
    const rawDesc = document.getElementById('descriptor-text').innerText;
    if (!rawDesc || rawDesc === "Awaiting input..." || rawDesc.includes("Error") || rawDesc === "") {
        alert("Please generate a descriptor first.");
        return;
    }

    const walletType = document.getElementById('wallet-type').value;
    let archType = 'single';
    
    const isMulti = walletType === 'multi';
    const nTotal = isMulti ? parseInt(document.getElementById('n-total').value) : 1;
    const mReq = isMulti ? parseInt(document.getElementById('m-required').value) : 1;

    if (isMulti) {
        archType = `multi-${mReq}${nTotal}`;
        if (archType !== 'multi-23' && archType !== 'multi-35') {
            archType = 'multi-23'; 
        }
    }

    const lastWords = [];
    const passphrases = [];
    
    for(let i = 0; i < nTotal; i++) {
        const inputs = document.querySelectorAll(`.seed-grid-${i} .word-input`);
        if (inputs.length > 0) {
            lastWords.push(inputs[inputs.length - 1].value.trim());
        } else {
            lastWords.push("");
        }
        
        const pass = document.getElementById(`passphrase-${i}`).value.trim();
        passphrases.push(pass);
    }

    const exportData = {
        archType: archType,
        descriptor: rawDesc,
        lastWords: lastWords,
        passphrases: passphrases
    };

    localStorage.setItem('safeKeepArchExport', JSON.stringify(exportData));
    
    alert("Data packaged and ready to hand off!\n\nOpening Architecture Planner...");
    window.open('../architecture/index.html', '_blank');
}

// --- THEME TOGGLE LOGIC ---
function toggleTheme() {
    const html = document.documentElement;
    const currentTheme = html.getAttribute('data-theme');
    const btn = document.getElementById('theme-btn');
    
    if (currentTheme === 'light') {
        html.removeAttribute('data-theme'); 
        localStorage.setItem('safekeepTheme', 'dark');
        btn.innerText = '☀️'; 
    } else {
        html.setAttribute('data-theme', 'light');
        localStorage.setItem('safekeepTheme', 'light');
        btn.innerText = '🌙'; 
    }
}

window.addEventListener('DOMContentLoaded', () => {
    if (localStorage.getItem('safekeepTheme') === 'light') {
        document.getElementById('theme-btn').innerText = '🌙';
    }
});

document.getElementById('btn-generate').addEventListener('click', generateDescriptor);
document.getElementById('btn-copy').addEventListener('click', copyDescriptor);
document.getElementById('btn-download').addEventListener('click', downloadDescriptor);
</script>
